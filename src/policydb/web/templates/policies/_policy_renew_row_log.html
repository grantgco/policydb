<tr id="renew-row-{{ p.policy_uid }}" class="border-t-2 border-amber-400 bg-amber-50">
  <td colspan="10" class="px-4 py-4">

    <form
      hx-post="/policies/{{ p.policy_uid }}/renew/log"
      hx-target="#renew-row-{{ p.policy_uid }}"
      hx-swap="outerHTML"
      class="space-y-3">

      <input type="hidden" name="client_id" value="{{ p.client_id }}">
      <input type="hidden" name="policy_id" value="{{ p.id }}">

      <!-- Quick-log pills -->
      {% if quick_templates %}
      <div class="flex flex-wrap gap-1">
        {% for qt in quick_templates %}
        <button type="button"
          onclick="this.closest('form').querySelector('[name=activity_type]').value='{{ qt.type }}'; this.closest('form').querySelector('[name=subject]').value='{{ qt.subject }}'"
          class="text-xs bg-gray-100 text-gray-600 hover:bg-marsh hover:text-white px-2 py-0.5 rounded transition-colors">
          {{ qt.label }}
        </button>
        {% endfor %}
      </div>
      {% endif %}

      <!-- Row 1: Type, Subject, Duration, Follow-Up -->
      <div class="grid grid-cols-6 gap-3">
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Type</p>
          <select name="activity_type" required
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-amber-400 bg-white">
            {% for t in activity_types %}
            <option>{{ t }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-span-2">
          <p class="text-xs text-gray-500 mb-0.5">Subject <span class="text-red-400">*</span></p>
          <input type="text" name="subject" required autofocus value="{{ default_subject or '' }}"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-amber-400">
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Duration</p>
          <input type="number" name="duration_minutes" min="0" step="5" placeholder="min"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-amber-400">
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Follow-Up Date</p>
          <input type="date" name="follow_up_date"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-amber-400">
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Contact</p>
          <input type="text" name="contact_person" placeholder="Name"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-amber-400">
        </div>
      </div>

      <!-- Row 2: Details (collapsed by default) -->
      <details class="group">
        <summary class="text-xs text-gray-400 cursor-pointer hover:text-gray-600">Details +</summary>
        <div class="mt-1">
          <textarea name="details" rows="2"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-amber-400"></textarea>
        </div>
      </details>

      <!-- Row 3: Actions -->
      <div class="flex items-center gap-3">
        <button type="submit"
          class="bg-amber-500 hover:bg-amber-600 text-white text-xs font-medium px-4 py-1.5 rounded-lg transition-colors">
          Save Activity
        </button>
        <button type="button"
          hx-get="/policies/{{ p.policy_uid }}/renew/row"
          hx-target="#renew-row-{{ p.policy_uid }}"
          hx-swap="outerHTML"
          class="text-xs text-gray-500 hover:text-gray-700 hover:underline">
          Cancel
        </button>
        <span class="text-xs text-gray-400 ml-auto font-mono">{{ p.policy_uid }} · {{ p.policy_type }} · {{ p.client_name }}</span>
      </div>

    </form>

  </td>
</tr>
