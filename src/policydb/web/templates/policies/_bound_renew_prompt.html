<div class="fixed bottom-6 right-6 z-50 bg-white border border-green-200 rounded-lg shadow-lg p-4 max-w-sm animate-fade-in">
  <p class="text-sm text-gray-700 mb-3">
    <span class="font-semibold text-green-700">Done!</span>
    Create the next renewal term?
  </p>
  <div class="flex gap-2">
    <form method="POST" action="/policies/{{ uid }}/renew">
      <button class="px-3 py-1.5 text-sm bg-marsh text-white rounded hover:bg-marsh/90">
        Create Next Term
      </button>
    </form>
    <button onclick="document.getElementById('bound-confirm-prompt').innerHTML=''"
            class="px-3 py-1.5 text-sm border border-gray-300 text-gray-600 rounded hover:bg-gray-50">
      Not Now
    </button>
  </div>
</div>
