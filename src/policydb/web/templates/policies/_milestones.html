<div id="milestones-{{ policy.policy_uid }}">
  {% if checklist %}
  {% for item in checklist %}
  <label class="flex items-center gap-2 py-0.5 cursor-pointer">
    <input type="checkbox" {% if item.completed %}checked{% endif %}
      hx-post="/policies/{{ policy.policy_uid }}/milestones/{{ item.name | urlencode }}"
      hx-target="#milestones-{{ policy.policy_uid }}" hx-swap="outerHTML"
      class="rounded border-gray-300 text-marsh focus:ring-marsh">
    <span class="text-sm {% if item.completed %}line-through text-gray-400{% else %}text-gray-700{% endif %}">{{ item.name }}</span>
    {% if item.completed and item.completed_at %}
    <span class="text-xs text-gray-400 ml-auto">{{ item.completed_at[:10] }}</span>
    {% endif %}
  </label>
  {% endfor %}
  {% else %}
  <p class="text-xs text-gray-400">No milestones configured. Add them in <a href="/settings" class="text-marsh hover:underline">Settings → Renewal Checklist</a>.</p>
  {% endif %}
</div>
