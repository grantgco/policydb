{# Normalized Premium — Grouped bar chart comparing prior vs current rate per exposure unit #}
{% from "charts/_chart_base.html" import chart_frame %}
{% call(area_id) chart_frame("Normalized Premium", "Rate per exposure unit: prior vs current") %}
<div id="{{ area_id }}" style="width:100%;height:100%"></div>
<script>
window.render_normalized_premium = function() {
  var data = window.chartData_normalized_premium;
  var containerId = '{{ area_id }}';
  var container = document.getElementById(containerId);
  if (!data || !data.length) {
    container.innerHTML = '<div class="chart-empty">No normalized premium data available</div>';
    return;
  }

  var chart = createChartSvg(containerId, {
    margin: {top: 30, right: 30, bottom: 60, left: 70}
  });
  var g = chart.g, w = chart.width, h = chart.height;

  // Scales
  var types = data.map(function(d) { return d.exposure_type; });
  var xScale = d3.scaleBand()
    .domain(types)
    .range([0, w])
    .padding(0.35);

  var allRates = [];
  data.forEach(function(d) {
    if (d.prior_rate != null) allRates.push(d.prior_rate);
    if (d.current_rate != null) allRates.push(d.current_rate);
  });
  var yMax = d3.max(allRates) || 1;
  var yScale = d3.scaleLinear()
    .domain([0, yMax * 1.2])
    .range([h, 0])
    .nice();

  // Determine unit label from first item
  var unitLabel = 'Rate';
  if (data[0] && data[0].unit) {
    unitLabel = 'per ' + data[0].unit;
  }

  // Grid lines
  g.append('g')
    .attr('class', 'chart-grid')
    .call(d3.axisLeft(yScale).tickSize(-w).tickFormat(''))
    .select('.domain').remove();

  // X axis
  var xAxis = g.append('g')
    .attr('class', 'chart-axis')
    .attr('transform', 'translate(0,' + h + ')')
    .call(d3.axisBottom(xScale));

  // Truncate long labels
  xAxis.selectAll('text')
    .each(function() {
      var txt = this.textContent;
      if (txt.length > 14) this.textContent = txt.substring(0, 12) + '\u2026';
    })
    .style('text-anchor', 'end')
    .attr('dx', '-0.5em')
    .attr('dy', '0.5em')
    .attr('transform', 'rotate(-25)');

  // Y axis
  g.append('g')
    .attr('class', 'chart-axis')
    .call(d3.axisLeft(yScale).ticks(6).tickFormat(function(v) { return formatCurrency(v); }));

  // Y axis label
  g.append('text')
    .attr('transform', 'rotate(-90)')
    .attr('x', -h / 2)
    .attr('y', -55)
    .attr('text-anchor', 'middle')
    .style('font-size', '10px')
    .attr('fill', '#6b7280')
    .text(unitLabel);

  // Grouped bars — prior (gray) and current (blue)
  var barGroupW = xScale.bandwidth();
  var barW = barGroupW / 2 - 2;

  data.forEach(function(d) {
    var x0 = xScale(d.exposure_type);

    // Prior bar
    if (d.prior_rate != null) {
      g.append('rect')
        .attr('x', x0)
        .attr('y', yScale(d.prior_rate))
        .attr('width', barW)
        .attr('height', h - yScale(d.prior_rate))
        .attr('rx', 2)
        .attr('fill', ChartColors.prior);
    }

    // Current bar
    if (d.current_rate != null) {
      g.append('rect')
        .attr('x', x0 + barW + 4)
        .attr('y', yScale(d.current_rate))
        .attr('width', barW)
        .attr('height', h - yScale(d.current_rate))
        .attr('rx', 2)
        .attr('fill', ChartColors.current);
    }

    // % change label above the pair
    if (d.prior_rate != null && d.current_rate != null && d.prior_rate > 0) {
      var pctChange = ((d.current_rate - d.prior_rate) / d.prior_rate) * 100;
      var labelColor = pctChange > 0 ? ChartColors.increase : (pctChange < 0 ? ChartColors.decrease : '#6b7280');
      var topY = Math.min(yScale(d.prior_rate), yScale(d.current_rate));
      g.append('text')
        .attr('x', x0 + barGroupW / 2)
        .attr('y', topY - 8)
        .attr('text-anchor', 'middle')
        .style('font-size', '10px')
        .style('font-weight', '700')
        .attr('fill', labelColor)
        .text(formatPercent(pctChange));
    }
  });

  // Legend
  addLegend(g, [
    {color: ChartColors.prior, label: 'Prior Rate'},
    {color: ChartColors.current, label: 'Current Rate'}
  ], w / 2 - 100, h + 40, {direction: 'horizontal', itemWidth: 110});
};
</script>
{% endcall %}
