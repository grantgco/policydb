{# ── Callout — Milestone Card ─────────────────────────────────────────────
   Single milestone/deadline with date, status badge, description, and
   progress bar.  Expects: ManualChart namespace available (manual.js loaded).
#}

<!-- ═══ Chart Display ═══════════════════════════════════════════════════════ -->
<div class="manual-chart-page-auto" style="display:flex;justify-content:center;padding:32px;">
  <div id="ms-card-container" style="width:520px;"></div>
</div>

<!-- ═══ Editor Panel ════════════════════════════════════════════════════════ -->
<div class="mc-editor" id="editor-panel">
  <div class="mc-editor-title">Configure Milestone Card</div>

  <!-- Display toggles -->
  <div class="display-options">
    <span class="section-label">Display</span>
    <label class="display-toggle">
      <input type="checkbox" id="show-progress" name="show-progress" checked onchange="refreshCurrentChart()">
      <span class="toggle-track"></span><span class="toggle-label">Progress Bar</span>
    </label>
  </div>

  <!-- Content -->
  <div style="margin-top:0.75rem;">
    <div class="section-head midnight">Content</div>

    <div style="display:flex;flex-direction:column;gap:0.6rem;">
      <!-- Super label -->
      <div class="input-group">
        <label>Super Label (above date)</label>
        <input type="text" id="val-super" name="val-super"
               value="Renewal Effective Date"
               oninput="refreshCurrentChart()"
               style="border:1px solid var(--mc-border);border-radius:3px;padding:0.38rem 0.6rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:var(--mc-bg);width:100%;">
      </div>

      <!-- Date Line 1 + Date Line 2 on same row -->
      <div style="display:flex;gap:0.6rem;">
        <div class="input-group" style="flex:1;">
          <label>Date &mdash; Line 1 (e.g. "July 1")</label>
          <input type="text" id="val-date1" name="val-date1"
                 value="July 1"
                 oninput="refreshCurrentChart()"
                 style="border:1px solid var(--mc-border);border-radius:3px;padding:0.38rem 0.6rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:var(--mc-bg);width:100%;">
        </div>
        <div class="input-group" style="width:100px;">
          <label>Line 2 (e.g. "2025")</label>
          <input type="text" id="val-date2" name="val-date2"
                 value="2025"
                 oninput="refreshCurrentChart()"
                 style="border:1px solid var(--mc-border);border-radius:3px;padding:0.38rem 0.6rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:var(--mc-bg);width:100%;">
        </div>
      </div>

      <!-- Milestone Title -->
      <div class="input-group">
        <label>Milestone Title</label>
        <input type="text" id="val-milestone" name="val-milestone"
               value="Property &amp; Casualty Program Renewal"
               oninput="refreshCurrentChart()"
               style="border:1px solid var(--mc-border);border-radius:3px;padding:0.38rem 0.6rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:var(--mc-bg);width:100%;">
      </div>

      <!-- Description -->
      <div class="input-group">
        <label>Description</label>
        <textarea id="val-desc" name="val-desc"
                  oninput="refreshCurrentChart()"
                  rows="3"
                  style="border:1px solid var(--mc-border);border-radius:3px;padding:0.38rem 0.6rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:var(--mc-bg);width:100%;resize:vertical;">All lines bind simultaneously. Certificates of insurance to be issued within 3 business days of binding.</textarea>
      </div>

      <!-- Status pills -->
      <div class="input-group">
        <label>Status</label>
        <input type="hidden" id="cfg-status" name="cfg-status" value="upcoming">
        <div id="status-pills" style="display:flex;gap:0.35rem;flex-wrap:wrap;"></div>
      </div>

      <!-- Progress slider -->
      <div class="input-group">
        <label>Progress &mdash; <span id="progress-label">65</span>%</label>
        <input type="range" id="cfg-progress" name="cfg-progress"
               min="0" max="100" value="65"
               oninput="document.getElementById('progress-label').textContent=this.value;refreshCurrentChart()"
               style="width:100%;accent-color:var(--mc-midnight,#000F47);">
      </div>
    </div>
  </div>

  <!-- Style -->
  <div style="margin-top:1rem;">
    <div class="section-head midnight">Style</div>

    <!-- Accent color swatches -->
    <div class="input-group" style="margin-bottom:0.6rem;">
      <label>Accent Color</label>
      <input type="hidden" id="cfg-accent-color" name="cfg-accent-color" value="#000F47">
      <div id="color-swatches" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:0.25rem;"></div>
    </div>

    <!-- Card width -->
    <div class="input-group">
      <label>Card Width</label>
      <select id="cfg-card-width" name="cfg-card-width"
              onchange="refreshCurrentChart()"
              style="border:1px solid var(--mc-border);border-radius:3px;padding:0.38rem 0.55rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:white;width:140px;">
        <option value="400">400 px</option>
        <option value="520" selected>520 px</option>
        <option value="680">680 px</option>
      </select>
    </div>
  </div>

  <!-- Footer -->
  <div class="mc-editor-footer">
    <button class="btn-mc" onclick="refreshCurrentChart()">Refresh Card</button>
  </div>
</div>

<!-- ═══ Script ══════════════════════════════════════════════════════════════ -->
<script>
(function () {
  var MC = ManualChart.COLORS;
  var C  = ManualChart.DATA_COLORS;

  // ── Status map ────────────────────────────────────────────────────────
  var STATUS = {
    complete: { label: 'Complete', bg: '#dcfce7', color: '#15803d' },
    pending:  { label: 'Pending',  bg: '#fef3c7', color: '#b45309' },
    upcoming: { label: 'Upcoming', bg: '#dbeafe', color: '#1d4ed8' },
    overdue:  { label: 'Overdue',  bg: '#fee2e2', color: '#b91c1c' },
  };

  // ── Defaults ──────────────────────────────────────────────────────────
  var defaults = {
    superLabel:  'Renewal Effective Date',
    dateLine1:   'July 1',
    dateLine2:   '2025',
    milestone:   'Property & Casualty Program Renewal',
    desc:        'All lines bind simultaneously. Certificates of insurance to be issued within 3 business days of binding.',
    status:      'upcoming',
    progress:    65,
    accentColor: MC.midnight,
    cardWidth:   520,
  };

  // ── Helpers ───────────────────────────────────────────────────────────
  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  // ── Status Pills ──────────────────────────────────────────────────────
  function buildStatusPills() {
    var container = document.getElementById('status-pills');
    var current = document.getElementById('cfg-status').value || defaults.status;
    container.innerHTML = '';

    var keys = ['complete', 'pending', 'upcoming', 'overdue'];
    keys.forEach(function (s) {
      var info = STATUS[s];
      var active = (s === current);
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = info.label;
      btn.dataset.status = s;
      btn.style.cssText =
        'padding:0.3rem 0.7rem;border-radius:99px;cursor:pointer;font-family:"Noto Sans",sans-serif;' +
        'font-size:0.75rem;font-weight:600;letter-spacing:0.02em;transition:all 0.12s;' +
        'border:1.5px solid ' + (active ? info.color : 'var(--mc-border)') + ';' +
        'background:' + (active ? info.bg : 'white') + ';' +
        'color:' + (active ? info.color : 'var(--mc-muted,#7B7974)') + ';';
      btn.onmouseover = function () { if (!active) { btn.style.borderColor = info.color; btn.style.color = info.color; } };
      btn.onmouseout  = function () { if (!active) { btn.style.borderColor = 'var(--mc-border)'; btn.style.color = 'var(--mc-muted,#7B7974)'; } };
      btn.onclick = function () {
        document.getElementById('cfg-status').value = s;
        buildStatusPills();
        refreshCurrentChart();
      };
      container.appendChild(btn);
    });
  }

  // ── Accent Color Swatches ────────────────────────────────────────────
  function buildSwatches() {
    var container = document.getElementById('color-swatches');
    var current = document.getElementById('cfg-accent-color').value || defaults.accentColor;
    container.innerHTML = '';
    C.forEach(function (color) {
      var sw = document.createElement('div');
      sw.style.cssText = 'width:22px;height:22px;border-radius:3px;cursor:pointer;border:2px solid ' +
        (color === current ? MC.midnight : 'transparent') + ';background:' + color + ';transition:transform 0.1s;';
      sw.onmouseover = function () { sw.style.transform = 'scale(1.15)'; };
      sw.onmouseout  = function () { sw.style.transform = ''; };
      sw.onclick = function () {
        document.getElementById('cfg-accent-color').value = color;
        buildSwatches();
        refreshCurrentChart();
      };
      container.appendChild(sw);
    });
  }

  // ── Build Card HTML ──────────────────────────────────────────────────
  function buildCard() {
    var superLabel  = document.getElementById('val-super').value;
    var dateLine1   = document.getElementById('val-date1').value;
    var dateLine2   = document.getElementById('val-date2').value;
    var milestone   = document.getElementById('val-milestone').value;
    var desc        = document.getElementById('val-desc').value;
    var status      = document.getElementById('cfg-status').value || defaults.status;
    var progress    = parseInt(document.getElementById('cfg-progress').value, 10) || 0;
    var accentColor = document.getElementById('cfg-accent-color').value || defaults.accentColor;

    var showProgress = ManualChart.isToggled('show-progress');

    var st = STATUS[status] || STATUS.upcoming;

    var html =
      '<div style="background:#fff;border:1px solid ' + MC.neutral500 + ';border-radius:4px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);">' +
        '<div style="padding:28px 28px 24px;">' +
          // Header row: date block + status badge
          '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;">' +
            // Left: super label + date
            '<div>' +
              (superLabel ?
                '<div style="font-family:\'Noto Sans\',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:0.09em;color:' + MC.neutral750 + ';font-weight:600;margin-bottom:2px;">' + esc(superLabel) + '</div>'
                : '') +
              '<div style="font-family:\'Noto Serif\',serif;font-size:30px;color:' + accentColor + ';line-height:1;">' +
                esc(dateLine1) + '<br>' + esc(dateLine2) +
              '</div>' +
            '</div>' +
            // Right: status badge
            '<div style="font-family:\'Noto Sans\',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.04em;padding:4px 12px;border-radius:99px;white-space:nowrap;margin-top:5px;' +
              'background:' + st.bg + ';color:' + st.color + ';border:1.5px solid ' + st.color + ';">' +
              st.label +
            '</div>' +
          '</div>' +
          // Milestone title
          (milestone ?
            '<div style="font-family:\'Noto Sans\',sans-serif;font-size:17px;font-weight:600;color:' + MC.midnight + ';margin-bottom:8px;line-height:1.3;">' + esc(milestone) + '</div>'
            : '') +
          // Description
          (desc ?
            '<div style="font-family:\'Noto Sans\',sans-serif;font-size:13px;color:' + MC.neutral750 + ';line-height:1.6;">' + esc(desc) + '</div>'
            : '') +
          // Progress bar
          (showProgress ?
            '<div style="height:4px;border-radius:2px;margin-top:20px;background:' + MC.neutral500 + ';overflow:hidden;">' +
              '<div style="height:100%;border-radius:2px;width:' + progress + '%;background:' + accentColor + ';transition:width 0.3s;"></div>' +
            '</div>'
            : '') +
        '</div>' +
      '</div>';

    return html;
  }

  // ── refreshCurrentChart — main render entry point ────────────────────
  window.refreshCurrentChart = function () {
    var container = document.getElementById('ms-card-container');
    var cardWidth = parseInt(document.getElementById('cfg-card-width').value, 10) || defaults.cardWidth;

    container.style.width = cardWidth + 'px';
    container.innerHTML = buildCard();
  };

  // ── Bootstrap ────────────────────────────────────────────────────────
  setTimeout(function () {
    buildStatusPills();
    buildSwatches();
    refreshCurrentChart();
  }, 50);
})();
</script>
