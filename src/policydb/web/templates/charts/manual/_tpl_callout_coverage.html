{# -- Callout -- Coverage Card ------------------------------------------------
   Coverage line summary with limit, deductible, premium, effective date,
   and key terms.  Expects: ManualChart namespace available (manual.js loaded).
#}

<!-- === Chart Display ======================================================= -->
<div class="manual-chart-page-auto" style="display:flex;justify-content:center;padding:32px;">
  <div id="cov-card-container" style="width:520px;"></div>
</div>

<!-- === Editor Panel ======================================================== -->
<div class="mc-editor" id="editor-panel">
  <div class="mc-editor-title">Configure Coverage Card</div>

  <!-- Display toggles -->
  <div class="display-options">
    <span class="section-label">Display</span>
    <label class="display-toggle">
      <input type="checkbox" id="show-header" name="show-header" checked onchange="refreshCurrentChart()">
      <span class="toggle-track"></span><span class="toggle-label">Header</span>
    </label>
    <label class="display-toggle">
      <input type="checkbox" id="show-terms" name="show-terms" checked onchange="refreshCurrentChart()">
      <span class="toggle-track"></span><span class="toggle-label">Terms</span>
    </label>
  </div>

  <!-- Content -->
  <div style="margin-top:0.75rem;">
    <div class="section-head midnight">Content</div>

    <div style="display:flex;flex-direction:column;gap:0.6rem;">
      <!-- Line of Coverage -->
      <div class="input-group">
        <label>Line of Coverage</label>
        <input type="text" id="val-line" name="val-line"
               value="Property &mdash; All Risk"
               oninput="refreshCurrentChart()"
               style="border:1px solid var(--mc-border);border-radius:3px;padding:0.38rem 0.6rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:var(--mc-bg);width:100%;">
      </div>

      <!-- Carrier -->
      <div class="input-group">
        <label>Carrier</label>
        <input type="text" id="val-carrier" name="val-carrier"
               value="Munich Re"
               oninput="refreshCurrentChart()"
               style="border:1px solid var(--mc-border);border-radius:3px;padding:0.38rem 0.6rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:var(--mc-bg);width:100%;">
      </div>

      <!-- Limit + Deductible on same row -->
      <div style="display:flex;gap:0.6rem;">
        <div class="input-group" style="flex:1;">
          <label>Limit</label>
          <input type="text" id="val-limit" name="val-limit"
                 value="$250,000,000"
                 oninput="refreshCurrentChart()"
                 style="border:1px solid var(--mc-border);border-radius:3px;padding:0.38rem 0.6rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:var(--mc-bg);width:100%;">
        </div>
        <div class="input-group" style="flex:1;">
          <label>Deductible / Retention</label>
          <input type="text" id="val-deductible" name="val-deductible"
                 value="$500,000"
                 oninput="refreshCurrentChart()"
                 style="border:1px solid var(--mc-border);border-radius:3px;padding:0.38rem 0.6rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:var(--mc-bg);width:100%;">
        </div>
      </div>

      <!-- Premium + Effective on same row -->
      <div style="display:flex;gap:0.6rem;">
        <div class="input-group" style="flex:1;">
          <label>Annual Premium</label>
          <input type="text" id="val-premium" name="val-premium"
                 value="$1,250,000"
                 oninput="refreshCurrentChart()"
                 style="border:1px solid var(--mc-border);border-radius:3px;padding:0.38rem 0.6rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:var(--mc-bg);width:100%;">
        </div>
        <div class="input-group" style="flex:1;">
          <label>Effective Date</label>
          <input type="text" id="val-effective" name="val-effective"
                 value="July 1, 2025"
                 oninput="refreshCurrentChart()"
                 style="border:1px solid var(--mc-border);border-radius:3px;padding:0.38rem 0.6rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:var(--mc-bg);width:100%;">
        </div>
      </div>

      <!-- Key Terms tag input -->
      <div class="input-group">
        <label>Key Terms / Conditions</label>
        <div style="display:flex;gap:0.35rem;">
          <input type="text" id="term-input"
                 placeholder="Add term..."
                 onkeydown="if(event.key==='Enter'){event.preventDefault();addTerm();}"
                 style="border:1px solid var(--mc-border);border-radius:3px;padding:0.38rem 0.6rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:var(--mc-bg);flex:1;">
          <button type="button" class="btn-mc sm" onclick="addTerm()"
                  style="white-space:nowrap;">Add</button>
        </div>
        <div id="term-tags" style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.4rem;"></div>
        <textarea id="co-cov-state" name="co-cov-state" style="display:none;"></textarea>
      </div>
    </div>
  </div>

  <!-- Style -->
  <div style="margin-top:1rem;">
    <div class="section-head midnight">Style</div>

    <!-- Accent color swatches -->
    <div class="input-group" style="margin-bottom:0.6rem;">
      <label>Header Color</label>
      <input type="hidden" id="cfg-accent-color" name="cfg-accent-color" value="#000F47">
      <div id="color-swatches" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:0.25rem;"></div>
    </div>

    <!-- Card width -->
    <div class="input-group">
      <label>Card Width</label>
      <select id="cfg-card-width" name="cfg-card-width"
              onchange="refreshCurrentChart()"
              style="border:1px solid var(--mc-border);border-radius:3px;padding:0.38rem 0.55rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:white;width:140px;">
        <option value="400">400 px</option>
        <option value="520" selected>520 px</option>
        <option value="680">680 px</option>
      </select>
    </div>
  </div>

  <!-- Footer -->
  <div class="mc-editor-footer">
    <button class="btn-mc" onclick="refreshCurrentChart()">Refresh Card</button>
  </div>
</div>

<!-- === Script ============================================================== -->
<script>
(function () {
  var MC = ManualChart.COLORS;
  var C  = ManualChart.DATA_COLORS;

  // -- Defaults ---------------------------------------------------------------
  var defaults = {
    line:        'Property \u2014 All Risk',
    carrier:     'Munich Re',
    limit:       '$250,000,000',
    deductible:  '$500,000',
    premium:     '$1,250,000',
    effective:   'July 1, 2025',
    accentColor: MC.midnight,
    cardWidth:   520,
  };

  var terms = ['Replacement Cost Value', 'Business Interruption', 'Flood Sub-Limited', 'EQ Sub-Limited'];

  // -- Helpers ----------------------------------------------------------------
  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function serializeTerms() {
    document.getElementById('co-cov-state').value = JSON.stringify(terms);
  }

  function renderTermTags() {
    var container = document.getElementById('term-tags');
    container.innerHTML = '';
    terms.forEach(function (t, i) {
      var pill = document.createElement('span');
      pill.style.cssText = 'display:inline-flex;align-items:center;gap:0.3rem;background:' + MC.neutral250 +
        ';border:1px solid ' + MC.neutral500 + ';border-radius:3px;padding:0.2rem 0.5rem;font-family:"Noto Sans",sans-serif;font-size:0.75rem;color:' + MC.neutral1000 + ';';
      pill.innerHTML = esc(t) + '<span style="cursor:pointer;color:' + MC.neutral750 +
        ';font-size:0.9rem;line-height:1;margin-left:0.15rem;" onclick="removeTerm(' + i + ')">&times;</span>';
      container.appendChild(pill);
    });
  }

  // -- Term add/remove (global for onclick) -----------------------------------
  window.addTerm = function () {
    var inp = document.getElementById('term-input');
    if (!inp.value.trim()) return;
    terms.push(inp.value.trim());
    inp.value = '';
    serializeTerms();
    renderTermTags();
    refreshCurrentChart();
  };

  window.removeTerm = function (idx) {
    terms.splice(idx, 1);
    serializeTerms();
    renderTermTags();
    refreshCurrentChart();
  };

  // -- Accent Color Swatches --------------------------------------------------
  function buildSwatches() {
    var container = document.getElementById('color-swatches');
    var current = document.getElementById('cfg-accent-color').value || defaults.accentColor;
    container.innerHTML = '';
    C.forEach(function (color) {
      var sw = document.createElement('div');
      sw.style.cssText = 'width:22px;height:22px;border-radius:3px;cursor:pointer;border:2px solid ' +
        (color === current ? MC.midnight : 'transparent') + ';background:' + color + ';transition:transform 0.1s;';
      sw.onmouseover = function () { sw.style.transform = 'scale(1.15)'; };
      sw.onmouseout  = function () { sw.style.transform = ''; };
      sw.onclick = function () {
        document.getElementById('cfg-accent-color').value = color;
        buildSwatches();
        refreshCurrentChart();
      };
      container.appendChild(sw);
    });
  }

  // -- Build Card HTML --------------------------------------------------------
  function buildCard() {
    var line        = document.getElementById('val-line').value;
    var carrier     = document.getElementById('val-carrier').value;
    var limit       = document.getElementById('val-limit').value;
    var deductible  = document.getElementById('val-deductible').value;
    var premium     = document.getElementById('val-premium').value;
    var effective   = document.getElementById('val-effective').value;
    var accentColor = document.getElementById('cfg-accent-color').value || defaults.accentColor;

    var showHeader = ManualChart.isToggled('show-header');
    var showTerms  = ManualChart.isToggled('show-terms');

    var html = '<div style="background:#fff;border:1px solid ' + MC.neutral500 + ';border-radius:4px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);">';

    // Header bar
    if (showHeader) {
      html += '<div style="padding:18px 24px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;background:' + accentColor + ';">';
      html += '<div style="font-family:\'Noto Serif\',serif;font-size:22px;color:#fff;line-height:1.2;">' + esc(line) + '</div>';
      if (carrier) {
        html += '<div style="font-family:\'Noto Sans\',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.06em;background:#334470;color:#fff;padding:4px 10px;border-radius:99px;white-space:nowrap;align-self:flex-start;margin-top:3px;">' + esc(carrier) + '</div>';
      }
      html += '</div>';
    }

    // Body
    html += '<div style="padding:20px 24px;">';

    // 2x2 grid
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px 24px;margin-bottom:' + (showTerms && terms.length ? '18px' : '0') + ';">';
    if (limit) {
      html += '<div>';
      html += '<div style="font-family:\'Noto Sans\',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:' + MC.neutral750 + ';font-weight:600;margin-bottom:3px;">Limit</div>';
      html += '<div style="font-family:\'Noto Sans\',sans-serif;font-size:15px;font-weight:600;color:' + MC.midnight + ';">' + esc(limit) + '</div>';
      html += '</div>';
    }
    if (deductible) {
      html += '<div>';
      html += '<div style="font-family:\'Noto Sans\',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:' + MC.neutral750 + ';font-weight:600;margin-bottom:3px;">Deductible / Retention</div>';
      html += '<div style="font-family:\'Noto Sans\',sans-serif;font-size:15px;font-weight:600;color:' + MC.midnight + ';">' + esc(deductible) + '</div>';
      html += '</div>';
    }
    if (premium) {
      html += '<div>';
      html += '<div style="font-family:\'Noto Sans\',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:' + MC.neutral750 + ';font-weight:600;margin-bottom:3px;">Annual Premium</div>';
      html += '<div style="font-family:\'Noto Sans\',sans-serif;font-size:15px;font-weight:600;color:' + MC.midnight + ';">' + esc(premium) + '</div>';
      html += '</div>';
    }
    if (effective) {
      html += '<div>';
      html += '<div style="font-family:\'Noto Sans\',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:' + MC.neutral750 + ';font-weight:600;margin-bottom:3px;">Effective Date</div>';
      html += '<div style="font-family:\'Noto Sans\',sans-serif;font-size:15px;font-weight:600;color:' + MC.midnight + ';">' + esc(effective) + '</div>';
      html += '</div>';
    }
    html += '</div>';

    // Key Terms
    if (showTerms && terms.length) {
      html += '<div style="font-family:\'Noto Sans\',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:' + MC.neutral750 + ';font-weight:600;margin-bottom:8px;">Key Terms &amp; Conditions</div>';
      html += '<div style="display:flex;flex-wrap:wrap;gap:6px;">';
      terms.forEach(function (t) {
        html += '<div style="font-family:\'Noto Sans\',sans-serif;background:' + MC.neutral250 + ';border:1px solid ' + MC.neutral500 + ';border-radius:3px;padding:4px 9px;font-size:12px;color:' + MC.neutral1000 + ';font-weight:500;">' + esc(t) + '</div>';
      });
      html += '</div>';
    }

    html += '</div>'; // close body
    html += '</div>'; // close card

    return html;
  }

  // -- refreshCurrentChart -- main render entry point -------------------------
  window.refreshCurrentChart = function () {
    var container = document.getElementById('cov-card-container');
    var cardWidth = parseInt(document.getElementById('cfg-card-width').value, 10) || defaults.cardWidth;

    // Rebuild terms from hidden state if it has content (snapshot restore)
    var stateEl = document.getElementById('co-cov-state');
    if (stateEl && stateEl.value) {
      try {
        var parsed = JSON.parse(stateEl.value);
        if (Array.isArray(parsed)) terms = parsed;
      } catch (e) { /* ignore */ }
    }

    container.style.width = cardWidth + 'px';
    container.innerHTML = buildCard();
    renderTermTags();
  };

  // -- Bootstrap --------------------------------------------------------------
  setTimeout(function () {
    serializeTerms();
    buildSwatches();
    renderTermTags();
    refreshCurrentChart();
  }, 50);
})();
</script>
