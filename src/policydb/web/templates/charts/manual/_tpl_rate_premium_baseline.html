{# Rate & Premium vs. Baseline — chart display + editor panel #}

<!-- ── Chart Display ─────────────────────────────────────────────────────── -->
<div class="manual-chart-page">
  <div class="manual-chart-wrap" style="display:flex;flex-direction:column;">

    <!-- Header -->
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;gap:1rem;flex-wrap:wrap;">
      <div>
        <h2 style="font-family:'Noto Serif',serif;font-size:1.6rem;color:#000F47;line-height:1.2;margin:0 0 0.3rem;">
          Rate &amp; Premium vs. Baseline
        </h2>
        <p id="chart-subtitle" style="font-size:0.82rem;color:#7B7974;font-weight:400;letter-spacing:0.03em;margin:0;">
          Placeholder values &mdash; update below
        </p>
      </div>
      <div class="toggle-pills">
        <button class="pill-btn active" id="pill-rate" onclick="toggleSeries('rate')" style="border-color:#0e8c79;background:rgba(14,140,121,0.08);color:#0e8c79;">
          <span class="pill-dot"></span> Rate
        </button>
        <button class="pill-btn active" id="pill-prem" onclick="toggleSeries('prem')" style="border-color:#000F47;background:rgba(0,15,71,0.08);color:#000F47;">
          <span class="pill-dot"></span> Premium
        </button>
      </div>
    </div>

    <!-- Callout bar -->
    <div class="callout-bar" id="callout-bar"></div>

    <!-- Axis labels -->
    <div class="axis-labels">
      <span class="axis-label" id="lbl-rate" style="background:rgba(14,140,121,0.1);color:#0e8c79;">&larr; Rate (per $100 TIV)</span>
      <span class="axis-label" id="lbl-prem" style="background:rgba(0,15,71,0.1);color:#000F47;">Premium ($) &rarr;</span>
    </div>

    <!-- Legend -->
    <div class="mc-legend">
      <div class="mc-legend-item" id="leg-rate">
        <div class="mc-legend-swatch" style="background:#0e8c79;"></div> Rate
      </div>
      <div class="mc-legend-item" id="leg-prem">
        <div class="mc-legend-swatch" style="background:#000F47;"></div> Premium
      </div>
      <div class="mc-legend-item">
        <div class="mc-legend-swatch" style="background:transparent;border-top:2px dashed #c8102e;"></div> Baselines
      </div>
    </div>

    <!-- Canvas -->
    <div style="position:relative;flex:1;min-height:0;">
      <canvas id="rpbChart"></canvas>
    </div>
  </div>
</div>

<!-- ── Editor Panel ──────────────────────────────────────────────────────── -->
<div class="mc-editor" id="editor-panel">
  <div class="mc-editor-title">Configure &amp; Edit Values</div>

  <!-- Config strip -->
  <div class="config-strip">
    <div class="config-field">
      <div class="config-label">Start Year</div>
      <input type="number" id="cfg-start" name="cfg-start" value="2022" min="1990" max="2099" step="1">
    </div>
    <div class="config-field">
      <div class="config-label">Number of Years</div>
      <select id="cfg-num" name="cfg-num">
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4" selected>4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
      </select>
    </div>
    <div class="config-field">
      <div class="config-label">Baseline Year</div>
      <select id="cfg-baseline" name="cfg-baseline"></select>
    </div>
    <div class="config-field wide">
      <div class="config-label">Rate Unit Label</div>
      <input type="text" id="cfg-rate-unit" name="cfg-rate-unit" value="per $100 TIV">
    </div>
    <button class="btn-mc" onclick="applyConfig()">Apply</button>
  </div>

  <!-- Rate inputs -->
  <div style="margin-bottom:1.1rem;">
    <div class="section-head teal">Rates</div>
    <div class="mc-editor-grid" id="rate-inputs"></div>
  </div>

  <!-- Premium inputs -->
  <div style="margin-bottom:1.1rem;">
    <div class="section-head midnight">Premiums ($)</div>
    <div class="mc-editor-grid" id="prem-inputs"></div>
  </div>

  <!-- Footer -->
  <div class="mc-editor-footer">
    <input type="text" id="val-subtitle" name="val-subtitle"
           placeholder="Client name / subtitle"
           value="2022–2025 | Placeholder values — update below"
           style="flex:1;min-width:200px;border:1px solid var(--mc-border);border-radius:3px;padding:0.4rem 0.6rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:var(--mc-bg);">
    <button class="btn-mc" onclick="refreshCurrentChart()">Refresh Chart</button>
  </div>
</div>

<!-- ── Script ─────────────────────────────────────────────────────────────── -->
<script>
(function () {
  // ── State ───────────────────────────────────────────────────────────────
  var showRate = true;
  var showPrem = true;
  var chart    = null;
  var years    = [];

  // Seed data — used to pre-populate new inputs; cleared after first apply
  var seedR = { '2022': 0.450, '2023': 0.330, '2024': 0.355, '2025': 0.370 };
  var seedP = { '2022': 1000000, '2023': 775000, '2024': 815000, '2025': 845000 };

  // ── Formatters ──────────────────────────────────────────────────────────
  var fmtUSD  = ManualChart.fmtCurrency;
  var fmtRate = ManualChart.fmtRate;

  function pct(a, b) {
    if (!b || isNaN(b) || isNaN(a)) return '+0.0%';
    var d = (a - b) / Math.abs(b) * 100;
    return ManualChart.fmtPct(d);
  }

  function cls(d) {
    return ManualChart.deltaClass(d);
  }

  // ── Toggle pills ────────────────────────────────────────────────────────
  window.toggleSeries = function (which) {
    if (which === 'rate') {
      if (showRate && !showPrem) return; // prevent both off
      showRate = !showRate;
      var pillR = document.getElementById('pill-rate');
      if (showRate) {
        pillR.classList.add('active');
        pillR.style.borderColor = '#0e8c79';
        pillR.style.background = 'rgba(14,140,121,0.08)';
        pillR.style.color = '#0e8c79';
      } else {
        pillR.classList.remove('active');
        pillR.style.borderColor = '';
        pillR.style.background = '';
        pillR.style.color = '';
      }
    } else {
      if (showPrem && !showRate) return;
      showPrem = !showPrem;
      var pillP = document.getElementById('pill-prem');
      if (showPrem) {
        pillP.classList.add('active');
        pillP.style.borderColor = '#000F47';
        pillP.style.background = 'rgba(0,15,71,0.08)';
        pillP.style.color = '#000F47';
      } else {
        pillP.classList.remove('active');
        pillP.style.borderColor = '';
        pillP.style.background = '';
        pillP.style.color = '';
      }
    }
    refreshCurrentChart();
  };

  // ── Config helpers ──────────────────────────────────────────────────────
  function getBaselineYear() {
    return document.getElementById('cfg-baseline').value;
  }

  window.applyConfig = function () {
    var start = parseInt(document.getElementById('cfg-start').value);
    var num   = parseInt(document.getElementById('cfg-num').value);
    years = [];
    for (var i = 0; i < num; i++) years.push(String(start + i));

    // Rebuild baseline dropdown, preserving selection if still valid
    var blSel  = document.getElementById('cfg-baseline');
    var prevBL = blSel.value;
    blSel.innerHTML = '';
    years.forEach(function (y) {
      var o = document.createElement('option');
      o.value = y;
      o.textContent = y;
      if (y === prevBL) o.selected = true;
      blSel.appendChild(o);
    });
    if (years.indexOf(blSel.value) === -1) blSel.value = years[0];

    // Re-register baseline change listener
    blSel.onchange = function () { rebuildInputs(); refreshCurrentChart(); };

    rebuildInputs();
    refreshCurrentChart();
  };

  // ── Rebuild input grids ─────────────────────────────────────────────────
  function rebuildInputs() {
    var bl    = getBaselineYear();
    var rGrid = document.getElementById('rate-inputs');
    var pGrid = document.getElementById('prem-inputs');

    // Snapshot current values before clearing so edits survive a baseline change
    var prevR = {}, prevP = {};
    years.forEach(function (y) {
      var ri = document.getElementById('r-' + y);
      var pi = document.getElementById('p-' + y);
      if (ri) prevR[y] = ri.value;
      if (pi) prevP[y] = pi.value;
    });

    rGrid.innerHTML = '';
    pGrid.innerHTML = '';

    years.forEach(function (y) {
      var isBL  = (y === bl);
      var rVal  = prevR[y] || seedR[y] || '0.400';
      var pVal  = prevP[y] || seedP[y] || '1000000';
      var blTag = isBL ? ' (Baseline)' : '';

      var rg = document.createElement('div');
      rg.className = 'input-group' + (isBL ? ' is-baseline' : '');
      rg.innerHTML = '<label>' + y + ' Rate' + blTag + '</label>' +
        '<input type="number" class="rate" id="r-' + y + '" name="r-' + y + '" value="' + rVal + '" step="0.001">';
      rGrid.appendChild(rg);

      var pg = document.createElement('div');
      pg.className = 'input-group' + (isBL ? ' is-baseline' : '');
      pg.innerHTML = '<label>' + y + ' Premium' + blTag + '</label>' +
        '<input type="number" id="p-' + y + '" name="p-' + y + '" value="' + pVal + '" step="1000">';
      pGrid.appendChild(pg);
    });
  }

  // ── Read values from dynamic inputs ─────────────────────────────────────
  function readValues() {
    var bl = getBaselineYear();
    var rBL = parseFloat((document.getElementById('r-' + bl) || {}).value || 0);
    var pBL = parseFloat((document.getElementById('p-' + bl) || {}).value || 0);
    var rates = years.map(function (y) {
      return parseFloat((document.getElementById('r-' + y) || {}).value || 0);
    });
    var prems = years.map(function (y) {
      return parseFloat((document.getElementById('p-' + y) || {}).value || 0);
    });
    return { bl: bl, rBaseline: rBL, pBaseline: pBL, rates: rates, prems: prems };
  }

  // ── Stats bar ───────────────────────────────────────────────────────────
  function buildStats(rBaseline, pBaseline, rates, prems) {
    var bl      = getBaselineYear();
    var blIdx   = years.indexOf(bl);
    var currIdx = years.length - 1;
    var compIdx = Math.min(blIdx + 1, currIdx);
    var compY   = years[compIdx];
    var currY   = years[currIdx];

    var stats = [];

    if (showRate) {
      var d1 = rates[compIdx] - rBaseline;
      stats.push({
        label: compY + ' Rate \u0394',
        val: fmtRate(Math.abs(d1)) + ' (' + pct(rates[compIdx], rBaseline) + ')',
        c: cls(d1)
      });
      if (compIdx !== currIdx) {
        var d2 = rates[currIdx] - rBaseline;
        stats.push({
          label: currY + ' Rate vs. Baseline',
          val: fmtRate(Math.abs(d2)) + ' (' + pct(rates[currIdx], rBaseline) + ')',
          c: cls(d2)
        });
      }
    }

    if (showPrem) {
      var d3 = prems[compIdx] - pBaseline;
      stats.push({
        label: compY + ' Premium \u0394',
        val: fmtUSD(Math.abs(d3)) + ' (' + pct(prems[compIdx], pBaseline) + ')',
        c: cls(d3)
      });
      if (compIdx !== currIdx) {
        var d4 = prems[currIdx] - pBaseline;
        stats.push({
          label: currY + ' Premium vs. Baseline',
          val: fmtUSD(Math.abs(d4)) + ' (' + pct(prems[currIdx], pBaseline) + ')',
          c: cls(d4)
        });
      }
    }

    document.getElementById('callout-bar').innerHTML = stats.map(function (s) {
      return '<div class="callout-stat"><span class="lbl">' + s.label +
        '</span><span class="val ' + s.c + '">' + s.val + '</span></div>';
    }).join('');
  }

  // ── Chart datasets ──────────────────────────────────────────────────────
  function buildDatasets(rBaseline, pBaseline, rates, prems) {
    var rArr = years.map(function () { return rBaseline; });
    var pArr = years.map(function () { return pBaseline; });
    var ds   = [];

    if (showRate) {
      ds.push({
        label: 'Rate Baseline', data: rArr,
        borderColor: '#c8102e', borderWidth: 1.5, borderDash: [5, 4],
        pointRadius: 0, tension: 0, fill: false,
        yAxisID: 'yRate', order: 4
      });
      ds.push({
        label: 'Rate', data: rates,
        borderColor: '#0e8c79', borderWidth: 2.5,
        pointBackgroundColor: '#0e8c79', pointBorderColor: '#fff',
        pointBorderWidth: 2, pointRadius: 6, pointHoverRadius: 8,
        tension: 0.35,
        fill: !showPrem
          ? { target: '-1', above: 'rgba(14,140,121,0.10)', below: 'rgba(14,140,121,0.10)' }
          : false,
        yAxisID: 'yRate', order: 2
      });
    }

    if (showPrem) {
      ds.push({
        label: 'Premium Baseline', data: pArr,
        borderColor: '#c8102e', borderWidth: 1.5, borderDash: [5, 4],
        pointRadius: 0, tension: 0, fill: false,
        yAxisID: 'yPrem', order: 3
      });
      ds.push({
        label: 'Premium', data: prems,
        borderColor: '#000F47', borderWidth: 2.5,
        pointBackgroundColor: '#000F47', pointBorderColor: '#fff',
        pointBorderWidth: 2, pointRadius: 6, pointHoverRadius: 8,
        tension: 0.35,
        fill: !showRate
          ? { target: '-1', above: 'rgba(0,15,71,0.10)', below: 'rgba(0,15,71,0.10)' }
          : false,
        yAxisID: 'yPrem', order: 1
      });
    }

    return ds;
  }

  // ── Main render ─────────────────────────────────────────────────────────
  window.refreshCurrentChart = function () {
    var v        = readValues();
    var rateUnit = document.getElementById('cfg-rate-unit').value;
    var subtitle = document.getElementById('val-subtitle').value;

    document.getElementById('chart-subtitle').textContent = subtitle || '';

    // Axis labels visibility
    var lblRate = document.getElementById('lbl-rate');
    var lblPrem = document.getElementById('lbl-prem');
    lblRate.textContent    = '\u2190 Rate (' + rateUnit + ')';
    lblRate.style.visibility = showRate ? '' : 'hidden';
    lblPrem.style.visibility = showPrem ? '' : 'hidden';

    // Legend visibility
    document.getElementById('leg-rate').style.display = showRate ? '' : 'none';
    document.getElementById('leg-prem').style.display = showPrem ? '' : 'none';

    buildStats(v.rBaseline, v.pBaseline, v.rates, v.prems);

    var ctx = document.getElementById('rpbChart').getContext('2d');
    if (chart) chart.destroy();

    var rateUnit_ = rateUnit;
    var rBL_      = v.rBaseline;
    var pBL_      = v.pBaseline;

    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: years,
        datasets: buildDatasets(v.rBaseline, v.pBaseline, v.rates, v.prems)
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#000F47',
            titleFont: { family: 'Noto Sans', size: 12, weight: '600' },
            bodyFont:  { family: 'Noto Sans', size: 12 },
            padding: 12,
            cornerRadius: 4,
            callbacks: {
              label: function (c) {
                if (c.dataset.label.charAt(0) === '_') return null;
                var l = c.dataset.label;
                var val = c.raw;
                if (l === 'Rate Baseline')    return ' Rate Baseline: ' + fmtRate(val) + ' ' + rateUnit_;
                if (l === 'Rate')             return [' Rate: ' + fmtRate(val) + ' ' + rateUnit_, '  vs baseline: ' + pct(val, rBL_)];
                if (l === 'Premium Baseline') return ' Premium Baseline: ' + fmtUSD(val);
                if (l === 'Premium')          return [' Premium: ' + fmtUSD(val), '  vs baseline: ' + pct(val, pBL_)];
              }
            }
          }
        },
        scales: {
          x: {
            grid: { display: false },
            border: { display: false },
            ticks: {
              font: { family: 'Noto Sans', size: 13, weight: '500' },
              color: '#4a5060'
            }
          },
          yRate: {
            type: 'linear', position: 'left', display: showRate,
            grid: { color: '#e8e6de', lineWidth: 1 },
            border: { display: false },
            ticks: {
              font: { family: 'Noto Sans', size: 11 },
              color: '#0e8c79',
              callback: function (v) { return Number(v).toFixed(3); }
            }
          },
          yPrem: {
            type: 'linear', position: 'right', display: showPrem,
            grid: { display: !showRate },
            border: { display: false },
            ticks: {
              font: { family: 'Noto Sans', size: 11 },
              color: '#000F47',
              callback: function (v) { return fmtUSD(v); }
            }
          }
        }
      }
    });

    // Expose to editor.html for export
    currentChart = chart;
  };

  // ── Bootstrap ───────────────────────────────────────────────────────────
  requestAnimationFrame(() => applyConfig());
})();
</script>
