{# ── Timeline Builder ──────────────────────────────────────────────────────
   Multi-step process timeline with horizontal, vertical, or phase layouts.
   Expects: ManualChart namespace available (manual.js loaded).
#}

<!-- ═══ Scoped Styles ══════════════════════════════════════════════════════ -->
<style>
/* ── Timeline Canvas (preview card) ─────────────────────────────────────── */
#timeline-canvas {
  background: white;
  border-radius: 4px;
  box-shadow: 0 4px 32px rgba(0,0,0,0.13), 0 1px 4px rgba(0,0,0,0.07);
  overflow: hidden;
  font-family: 'Noto Sans', sans-serif;
  width: 900px;
  max-width: 100%;
}

/* ── Canvas header ── */
.tl-header {
  padding: 24px 32px 20px;
  border-bottom: 1px solid #e8e6e0;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
}
.tl-eyebrow {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.6px;
  color: #7B7974;
  font-weight: 600;
  margin-bottom: 3px;
}
.tl-title {
  font-family: 'Noto Serif', serif;
  font-size: 23px;
  color: #000F47;
  line-height: 1.2;
}
.tl-subtitle {
  font-size: 13px;
  color: #7B7974;
  margin-top: 4px;
}
.tl-header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  flex-shrink: 0;
}
.tl-progress-label {
  font-size: 11px;
  color: #7B7974;
  font-weight: 500;
  text-align: right;
}
.tl-progress-bar {
  width: 140px;
  height: 5px;
  background: #e8e6e0;
  border-radius: 3px;
  overflow: hidden;
}
.tl-progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s;
}

/* ── HORIZONTAL LAYOUT ── */
.tl-body-h {
  padding: 28px 32px 32px;
  overflow-x: auto;
}
.tl-track-h {
  display: flex;
  align-items: flex-start;
  gap: 0;
  position: relative;
  min-width: 0;
}
.tl-step-h {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  min-width: 100px;
}
/* connector line between steps */
.tl-step-h::before {
  content: '';
  position: absolute;
  top: 14px;
  left: calc(-50% + 14px);
  right: calc(50% + 14px);
  height: 2px;
  background: #e0ddd6;
  z-index: 0;
}
.tl-step-h:first-child::before { display: none; }
.tl-step-h.done::before { background: var(--step-color, #000F47); }

.tl-dot-h {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: white;
  position: relative; z-index: 1;
  flex-shrink: 0;
  box-shadow: 0 0 0 3px white;
}
.tl-step-h.status-complete .tl-dot-h { background: #16a34a; }
.tl-step-h.status-active   .tl-dot-h { background: var(--step-color, #0B4BFF); box-shadow: 0 0 0 3px white, 0 0 0 5px var(--step-color, #0B4BFF); }
.tl-step-h.status-upcoming .tl-dot-h { background: #d1d5db; color: #6b7280; }
.tl-step-h.status-overdue  .tl-dot-h { background: #ef4444; }
.tl-step-h.status-complete .tl-dot-h::after { content: '\2713'; }

.tl-label-h {
  margin-top: 12px;
  font-size: 12px;
  font-weight: 600;
  color: #000F47;
  text-align: center;
  line-height: 1.3;
  padding: 0 4px;
}
.tl-date-h {
  margin-top: 4px;
  font-size: 11px;
  color: #7B7974;
  text-align: center;
  font-weight: 500;
}
.tl-desc-h {
  margin-top: 6px;
  font-size: 11px;
  color: #6b7280;
  text-align: center;
  line-height: 1.5;
  padding: 0 4px;
}
.tl-owner-h {
  margin-top: 5px;
  font-size: 10px;
  font-weight: 600;
  color: #7B7974;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}

/* ── VERTICAL LAYOUT ── */
.tl-body-v { padding: 24px 32px 32px; }
.tl-step-v {
  display: grid;
  grid-template-columns: 28px 1fr;
  gap: 0 20px;
  position: relative;
  padding-bottom: 24px;
}
.tl-step-v:last-child { padding-bottom: 0; }
.tl-step-v::before {
  content: '';
  position: absolute;
  top: 28px;
  left: 13px;
  bottom: 0;
  width: 2px;
  background: #e0ddd6;
  z-index: 0;
}
.tl-step-v:last-child::before { display: none; }
.tl-step-v.done::before { background: var(--step-color, #000F47); }

.tl-dot-v {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: white;
  position: relative; z-index: 1;
  flex-shrink: 0;
  align-self: flex-start;
}
.tl-step-v.status-complete .tl-dot-v { background: #16a34a; }
.tl-step-v.status-complete .tl-dot-v::after { content: '\2713'; }
.tl-step-v.status-active   .tl-dot-v { background: var(--step-color, #0B4BFF); box-shadow: 0 0 0 3px white, 0 0 0 5px var(--step-color, #0B4BFF); }
.tl-step-v.status-upcoming .tl-dot-v { background: #d1d5db; color: #6b7280; }
.tl-step-v.status-overdue  .tl-dot-v { background: #ef4444; }

.tl-label-v {

  font-weight: 600;
  color: #000F47;
  line-height: 1.3;
  padding-top: 4px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.tl-status-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 99px;
  white-space: nowrap;
}
.badge-complete { background:#dcfce7; color:#15803d; }
.badge-active   { background:#dbeafe; color:#1d4ed8; }
.badge-upcoming { background:#f3f4f6; color:#374151; }
.badge-overdue  { background:#fee2e2; color:#b91c1c; }

.tl-date-v {
  font-size: 12px;
  color: #7B7974;
  font-weight: 500;

}
.tl-desc-v {
  font-size: 13px;
  color: #6b7280;

.tl-owner-v {

/* ── PHASE layout (grouped horizontal) ── */
.tl-phases { padding: 24px 32px 32px; display: flex; flex-direction: column; gap: 24px; }
.tl-phase-label {
  font-size: 10px;
  font-weight: 700;

/* ── Canvas footer ── */
.tl-footer {

<!-- ═══ Script ═════════════════════════════════════════════════════════════ -->
<script>
(function () {
  var MC = ManualChart.COLORS;
  var C  = ManualChart.DATA_COLORS;

  // ── Status metadata ────────────────────────────────────────────────────
  var STATUS_META = {
    complete: { label: 'Complete', badgeCls: 'badge-complete' },
    active:   { label: 'Active',   badgeCls: 'badge-active'   },
    upcoming: { label: 'Upcoming', badgeCls: 'badge-upcoming' },
    overdue:  { label: 'Overdue',  badgeCls: 'badge-overdue'  },
  };

  // ── Default steps ─────────────────────────────────────────────────────
  var steps = [
    { id: 1, title: 'Renewal Strategy Meeting',    date: '90 days out',   desc: 'Align on coverage needs, risk appetite, and renewal goals. Review loss history.', owner: 'Account Team', status: 'complete', phase: 'Strategy' },
    { id: 2, title: 'Exposure Data Collection',    date: '75 days out',   desc: 'Compile updated SOVs, payroll, revenue, fleet schedules, and other underwriting data.', owner: 'Client / Broker', status: 'complete', phase: 'Strategy' },
    { id: 3, title: 'Marketing Submission',        date: '60 days out',   desc: 'Prepare and submit to target markets. Include loss runs, risk narrative, and improvement letter.', owner: 'Placement Team', status: 'complete', phase: 'Marketing' },
    { id: 4, title: 'Underwriter Meetings',        date: '45 days out',   desc: 'Carrier meetings and site tours if applicable. Reinforce narrative and address questions.', owner: 'Account Team', status: 'active', phase: 'Marketing' },
    { id: 5, title: 'Quotes Due',                  date: '30 days out',   desc: 'All markets provide firm terms. Begin comparison analysis and coverage review.', owner: 'Placement Team', status: 'upcoming', phase: 'Binding' },
    { id: 6, title: 'Bind Order Issued',           date: '10 days out',   desc: 'Client selects program and authorizes binding. Confirm with all carriers.', owner: 'Client', status: 'upcoming', phase: 'Binding' },
    { id: 7, title: 'Effective Date',              date: 'July 1, 2026',  desc: 'Coverage attaches. Certificates and binders issued within 3 business days.', owner: 'Account Team', status: 'upcoming', phase: 'Issuance' },
    { id: 8, title: 'Policy Delivery',             date: 'Aug 1, 2026',   desc: 'Final policies reviewed, checked, and delivered to client with coverage summary.', owner: 'Account Team', status: 'upcoming', phase: 'Issuance' },
  ];
  var nextId = 9;
  var openStep = null;

  // ── Helpers ────────────────────────────────────────────────────────────
  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function tintOnWhite(hex, alpha) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    var rr = Math.round(r * alpha + 255 * (1 - alpha));
    var gg = Math.round(g * alpha + 255 * (1 - alpha));
    var bb = Math.round(b * alpha + 255 * (1 - alpha));
    return '#' + ((1<<24)+(rr<<16)+(gg<<8)+bb).toString(16).slice(1);
  }

  function completedCount() { return steps.filter(function(s){ return s.status === 'complete'; }).length; }
  function progressPct() {
    if (!steps.length) return 0;
    return Math.round(completedCount() / steps.length * 100);
  }

  // ── Accent Color Swatches ─────────────────────────────────────────────
  function buildSwatches() {
    var container = document.getElementById('color-swatches');
    var current = document.getElementById('cfg-accent-color').value || MC.midnight;
    container.innerHTML = '';
    // Use DATA_COLORS plus red and teal as swatch options
    var swatchColors = C.concat([MC.red, MC.teal]);
    // De-duplicate
    var seen = {};
    swatchColors.forEach(function(color) {
      if (seen[color]) return;
      seen[color] = true;
      var sw = document.createElement('div');
      sw.style.cssText = 'width:22px;height:22px;border-radius:3px;cursor:pointer;border:2px solid ' +
        (color === current ? MC.midnight : 'transparent') + ';background:' + color + ';transition:transform 0.1s;';
      sw.onmouseover = function () { sw.style.transform = 'scale(1.15)'; };
      sw.onmouseout  = function () { sw.style.transform = ''; };
      sw.onclick = function () {
        document.getElementById('cfg-accent-color').value = color;
        buildSwatches();
        refreshCurrentChart();
      };
      container.appendChild(sw);
    });
  }

  // ── Layout buttons ────────────────────────────────────────────────────
  function initLayoutButtons() {
    var btns = document.querySelectorAll('#layout-btns .tl-layout-btn');
    btns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        var lay = btn.getAttribute('data-l');
        document.getElementById('cfg-layout').value = lay;
        btns.forEach(function(b) { b.classList.toggle('active', b.getAttribute('data-l') === lay); });
        refreshCurrentChart();
      });
    });
  }

  // ── Step Editor ───────────────────────────────────────────────────────
  function buildStepEditor() {
    var container = document.getElementById('steps-editor');
    var layout = document.getElementById('cfg-layout').value || 'horizontal';
    var accentColor = document.getElementById('cfg-accent-color').value || MC.midnight;
    container.innerHTML = '';

    steps.forEach(function(s, i) {
      var sm = STATUS_META[s.status] || STATUS_META.upcoming;
      var numBg = s.status === 'complete' ? '#16a34a' : s.status === 'overdue' ? '#ef4444' : s.status === 'active' ? accentColor : '#d1d5db';

      var div = document.createElement('div');
      div.className = 'tl-step-card';

      var phaseField = '';
      if (layout === 'phases') {
        phaseField =
          '<div class="tl-fg">' +
            '<label>Phase</label>' +
            '<input value="' + esc(s.phase) + '" data-step-id="' + s.id + '" data-step-field="phase">' +
          '</div>';
      }

      div.innerHTML =
        '<div class="tl-step-card-header" data-toggle-id="' + s.id + '">' +
          '<div class="tl-step-num" style="background:' + numBg + '">' + (i + 1) + '</div>' +
          '<div class="tl-step-card-title">' + (esc(s.title) || 'Untitled Step') + '</div>' +
          '<div class="tl-step-card-status ' + sm.badgeCls + '">' + sm.label + '</div>' +
          '<div class="tl-step-controls">' +
            '<button type="button" class="tl-step-ctrl-btn" data-move-id="' + s.id + '" data-move-dir="-1" title="Move up">&uarr;</button>' +
            '<button type="button" class="tl-step-ctrl-btn" data-move-id="' + s.id + '" data-move-dir="1" title="Move down">&darr;</button>' +
            '<button type="button" class="tl-step-ctrl-btn del" data-del-id="' + s.id + '" title="Delete">&times;</button>' +
          '</div>' +
        '</div>' +
        '<div class="tl-step-card-body' + (openStep === s.id ? ' open' : '') + '" id="sbody-' + s.id + '">' +
          '<div class="tl-fg">' +
            '<label>Step Title</label>' +
            '<input value="' + esc(s.title) + '" data-step-id="' + s.id + '" data-step-field="title">' +
          '</div>' +
          '<div class="tl-fg">' +
            '<label>Date / Timeframe</label>' +
            '<input value="' + esc(s.date) + '" data-step-id="' + s.id + '" data-step-field="date">' +
          '</div>' +
          '<div class="tl-fg">' +
            '<label>Description</label>' +
            '<textarea data-step-id="' + s.id + '" data-step-field="desc">' + esc(s.desc) + '</textarea>' +
          '</div>' +
          '<div class="tl-fg">' +
            '<label>Owner / Responsible Party</label>' +
            '<input value="' + esc(s.owner) + '" data-step-id="' + s.id + '" data-step-field="owner">' +
          '</div>' +
          phaseField +
          '<div class="tl-fg">' +
            '<label>Status</label>' +
            '<div class="tl-status-row">' +
              ['complete','active','upcoming','overdue'].map(function(st) {
                return '<button type="button" class="tl-sp' + (s.status === st ? ' s-' + st : '') + '" data-status-id="' + s.id + '" data-status-val="' + st + '">' + STATUS_META[st].label + '</button>';
              }).join('') +
            '</div>' +
          '</div>' +
        '</div>';

      container.appendChild(div);
    });

    // Attach event listeners (delegation-friendly approach)
    attachStepEditorEvents(container);
  }

  function attachStepEditorEvents(container) {
    // Header toggle
    container.querySelectorAll('.tl-step-card-header').forEach(function(hdr) {
      hdr.addEventListener('click', function(e) {
        // Ignore clicks on control buttons
        if (e.target.closest('.tl-step-controls')) return;
        var id = parseInt(hdr.getAttribute('data-toggle-id'));
        openStep = openStep === id ? null : id;
        buildStepEditor();
      });
    });

    // Move buttons
    container.querySelectorAll('[data-move-id]').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var id = parseInt(btn.getAttribute('data-move-id'));
        var dir = parseInt(btn.getAttribute('data-move-dir'));
        var i = steps.findIndex(function(s) { return s.id === id; });
        var j = i + dir;
        if (j < 0 || j >= steps.length) return;
        var tmp = steps[i]; steps[i] = steps[j]; steps[j] = tmp;
        serializeState();
        buildStepEditor();
        buildCanvas();
      });
    });

    // Delete buttons
    container.querySelectorAll('[data-del-id]').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var id = parseInt(btn.getAttribute('data-del-id'));
        steps = steps.filter(function(s) { return s.id !== id; });
        if (openStep === id) openStep = null;
        serializeState();
        buildStepEditor();
        buildCanvas();
      });
    });

    // Status pills
    container.querySelectorAll('[data-status-id]').forEach(function(pill) {
      pill.addEventListener('click', function() {
        var id = parseInt(pill.getAttribute('data-status-id'));
        var val = pill.getAttribute('data-status-val');
        var s = steps.find(function(st) { return st.id === id; });
        if (s) { s.status = val; }
        serializeState();
        buildStepEditor();
        buildCanvas();
      });
    });

    // Field inputs (title, date, desc, owner, phase)
    container.querySelectorAll('[data-step-id][data-step-field]').forEach(function(input) {
      input.addEventListener('input', function() {
        var id = parseInt(input.getAttribute('data-step-id'));
        var field = input.getAttribute('data-step-field');
        var s = steps.find(function(st) { return st.id === id; });
        if (s) {
          s[field] = input.value;
          serializeState();
          buildCanvas();
        }
      });
    });
  }

  // ── Add Step ──────────────────────────────────────────────────────────
  function addStep() {
    var layout = document.getElementById('cfg-layout').value || 'horizontal';
    var newStep = {
      id: nextId++,
      title: 'New Step',
      date: '',
      desc: '',
      owner: '',
      status: 'upcoming',
      phase: steps.length ? steps[steps.length - 1].phase : 'Phase 1',
    };
    steps.push(newStep);
    openStep = newStep.id;
    serializeState();
    buildStepEditor();
    buildCanvas();
    // Scroll editor to bottom
    var editorPanel = document.getElementById('editor-panel');
    setTimeout(function() { editorPanel.scrollTop = editorPanel.scrollHeight; }, 50);
  }

  // ── Serialize/Deserialize ─────────────────────────────────────────────
  function serializeState() {
    var el = document.getElementById('tl-state');
    if (el) {
      el.value = JSON.stringify({ steps: steps, nextId: nextId });
    }
  }

  function deserializeState() {
    var el = document.getElementById('tl-state');
    if (el && el.value) {
      try {
        var saved = JSON.parse(el.value);
        if (saved.steps && saved.steps.length) {
          steps = saved.steps;
          nextId = saved.nextId || steps.length + 1;
          return true;
        }
      } catch(e) {}
    }
    return false;
  }

  // ── Build Canvas (preview) ────────────────────────────────────────────
  function buildCanvas() {
    var eyebrow = document.getElementById('val-eyebrow').value || '';
    var title   = document.getElementById('val-title').value   || '';
    var subtitle = document.getElementById('val-subtitle').value || '';
    var footer  = document.getElementById('val-footer').value  || '';
    var accentColor = document.getElementById('cfg-accent-color').value || MC.midnight;
    var layout  = document.getElementById('cfg-layout').value || 'horizontal';
    var canvasWidth = parseInt(document.getElementById('cfg-canvas-width').value, 10) || 900;
    var pct = progressPct();

    var canvas = document.getElementById('timeline-canvas');
    canvas.style.width = canvasWidth + 'px';

    var showTitle    = ManualChart.isToggled('show-title');
    var showSubtitle = ManualChart.isToggled('show-subtitle');
    var showProgress = ManualChart.isToggled('show-progress');
    var showFooter   = ManualChart.isToggled('show-footer');
    var showLegend   = ManualChart.isToggled('show-legend');

    var body = layout === 'horizontal' ? buildHorizontal(accentColor)
             : layout === 'vertical'   ? buildVertical(accentColor)
             : buildPhases(accentColor);

    canvas.innerHTML =
      buildHeader(eyebrow, title, subtitle, pct, accentColor, showTitle, showSubtitle, showProgress) +
      body +
      buildFooter(footer, accentColor, showFooter, showLegend);
  }

  function buildHeader(eyebrow, title, subtitle, pct, accentColor, showTitle, showSubtitle, showProgress) {
    var done  = completedCount();
    var total = steps.length;

    var leftHTML = '';
    if (eyebrow) leftHTML += '<div class="tl-eyebrow">' + esc(eyebrow) + '</div>';
    if (showTitle && title) leftHTML += '<div class="tl-title">' + esc(title) + '</div>';
    if (showSubtitle && subtitle) leftHTML += '<div class="tl-subtitle">' + esc(subtitle) + '</div>';

    var rightHTML = '';
    if (showProgress) {
      rightHTML =
        '<div class="tl-header-right">' +
          '<div class="tl-progress-label">' + done + ' of ' + total + ' steps complete</div>' +
          '<div class="tl-progress-bar">' +
            '<div class="tl-progress-fill" style="width:' + pct + '%;background:' + accentColor + '"></div>' +
          '</div>' +
        '</div>';
    }

    // Hide header entirely if nothing to show
    if (!leftHTML && !rightHTML) return '';

    return '<div class="tl-header">' +
      '<div class="tl-header-left">' + leftHTML + '</div>' +
      rightHTML +
    '</div>';
  }

  function buildFooter(note, accentColor, showFooter, showLegend) {
    var noteHTML = showFooter && note ? '<div class="tl-footer-note">' + esc(note) + '</div>' : '<div></div>';
    var legendHTML = '';
    if (showLegend) {
      legendHTML =
        '<div class="tl-legend">' +
          '<div class="tl-legend-item"><div class="legend-dot" style="background:#16a34a"></div> Complete</div>' +
          '<div class="tl-legend-item"><div class="legend-dot" style="background:' + accentColor + '"></div> Active</div>' +
          '<div class="tl-legend-item"><div class="legend-dot" style="background:#d1d5db"></div> Upcoming</div>' +
          '<div class="tl-legend-item"><div class="legend-dot" style="background:#ef4444"></div> Overdue</div>' +
        '</div>';
    }
    if (!showFooter && !showLegend) return '';
    return '<div class="tl-footer">' + noteHTML + legendHTML + '</div>';
  }

  // ── Horizontal Layout ─────────────────────────────────────────────────
  function buildHorizontal(accentColor) {
    var stepHTML = steps.map(function(s, i) {
      var isDone = s.status === 'complete' || s.status === 'active';
      return '<div class="tl-step-h status-' + s.status + (isDone && i > 0 ? ' done' : '') + '"' +
             ' style="--step-color:' + accentColor + '">' +
          '<div class="tl-dot-h">' + (s.status !== 'complete' ? (i + 1) : '') + '</div>' +
          '<div class="tl-label-h">' + esc(s.title) + '</div>' +
          (s.date  ? '<div class="tl-date-h">' + esc(s.date) + '</div>' : '') +
          (s.desc  ? '<div class="tl-desc-h">' + esc(s.desc) + '</div>' : '') +
          (s.owner ? '<div class="tl-owner-h">' + esc(s.owner) + '</div>' : '') +
        '</div>';
    }).join('');
    return '<div class="tl-body-h"><div class="tl-track-h">' + stepHTML + '</div></div>';
  }

  // ── Vertical Layout ───────────────────────────────────────────────────
  function buildVertical(accentColor) {
    var stepHTML = steps.map(function(s, i) {
      var isDone = s.status === 'complete';
      var sm = STATUS_META[s.status] || STATUS_META.upcoming;
      return '<div class="tl-step-v status-' + s.status + (isDone ? ' done' : '') + '"' +
             ' style="--step-color:' + accentColor + '">' +
          '<div class="tl-dot-v">' + (s.status !== 'complete' ? (i + 1) : '') + '</div>' +
          '<div class="tl-content-v">' +
            '<div class="tl-label-v">' +
              esc(s.title) +
              ' <span class="tl-status-badge ' + sm.badgeCls + '">' + sm.label + '</span>' +
            '</div>' +
            (s.date  ? '<div class="tl-date-v">' + esc(s.date) + '</div>' : '') +
            (s.desc  ? '<div class="tl-desc-v">' + esc(s.desc) + '</div>' : '') +
            (s.owner ? '<div class="tl-owner-v">Owner: ' + esc(s.owner) + '</div>' : '') +
          '</div>' +
        '</div>';
    }).join('');
    return '<div class="tl-body-v">' + stepHTML + '</div>';
  }

  // ── Phases Layout ─────────────────────────────────────────────────────
  function buildPhases(accentColor) {
    // Group steps by phase, preserving order
    var phaseMap = [];
    var phaseIndex = {};
    steps.forEach(function(s, i) {
      var ph = s.phase || 'Ungrouped';
      if (phaseIndex[ph] === undefined) {
        phaseIndex[ph] = phaseMap.length;
        phaseMap.push({ phase: ph, items: [] });
      }
      phaseMap[phaseIndex[ph]].items.push({ s: s, i: i });
    });

    var globalIdx = 0;
    var phaseHTML = phaseMap.map(function(group) {
      var tagBg = tintOnWhite(accentColor, 0.09);
      var stepsH = group.items.map(function(item) {
        var s = item.s;
        var idx = globalIdx++;
        var isDone = s.status === 'complete' || s.status === 'active';
        return '<div class="tl-step-h status-' + s.status + (isDone && idx > 0 ? ' done' : '') + '"' +
               ' style="--step-color:' + accentColor + '; flex: 1; min-width:90px">' +
            '<div class="tl-dot-h">' + (s.status !== 'complete' ? (idx + 1) : '') + '</div>' +
            '<div class="tl-label-h">' + esc(s.title) + '</div>' +
            (s.date  ? '<div class="tl-date-h">' + esc(s.date) + '</div>' : '') +
            (s.desc  ? '<div class="tl-desc-h">' + esc(s.desc) + '</div>' : '') +
            (s.owner ? '<div class="tl-owner-h">' + esc(s.owner) + '</div>' : '') +
          '</div>';
      }).join('');

      return '<div class="tl-phase-block">' +
        '<div class="tl-phase-label" style="background:' + tagBg + ';color:' + accentColor + '">' + esc(group.phase) + '</div>' +
        '<div class="tl-phase-steps">' + stepsH + '</div>' +
      '</div>';
    }).join('');

    return '<div class="tl-phases">' + phaseHTML + '</div>';
  }

  // ── refreshCurrentChart — main render entry point ─────────────────────
  window.refreshCurrentChart = function () {
    // On snapshot load, check tl-state first if editor is empty
    var hasEditorCards = document.querySelectorAll('#steps-editor .tl-step-card').length > 0;
    var stateEl = document.getElementById('tl-state');

    if (stateEl && stateEl.value && !hasEditorCards) {
      deserializeState();
    }

    // Sync layout buttons to hidden input value
    var currentLayout = document.getElementById('cfg-layout').value || 'horizontal';
    document.querySelectorAll('#layout-btns .tl-layout-btn').forEach(function(b) {
      b.classList.toggle('active', b.getAttribute('data-l') === currentLayout);
    });

    serializeState();
    buildSwatches();
    buildStepEditor();
    buildCanvas();
  };

  // ── Add Step button ───────────────────────────────────────────────────
  document.getElementById('btn-add-step').addEventListener('click', addStep);

  // ── Bootstrap ─────────────────────────────────────────────────────────
  setTimeout(function () {
    initLayoutButtons();
    buildSwatches();
    serializeState();
    buildStepEditor();
    buildCanvas();
  }, 50);
})();
</script>
