{# ── Callout — Big Stat / KPI Card ─────────────────────────────────────────
   Large metric callout with direction arrow, accent bar, label, and context.
   Expects: ManualChart namespace available (manual.js loaded).
#}

<!-- ═══ Chart Display ═══════════════════════════════════════════════════════ -->
<div class="manual-chart-page-auto" style="display:flex;justify-content:center;padding:2rem;">
  <div id="stat-card-container" style="width:520px;"></div>
</div>

<!-- ═══ Editor Panel ════════════════════════════════════════════════════════ -->
<div class="mc-editor" id="editor-panel">
  <div class="mc-editor-title">Configure Big Stat Card</div>

  <!-- Display toggles -->
  <div class="display-options">
    <span class="section-label">Display</span>
    <label class="display-toggle">
      <input type="checkbox" id="show-eyebrow" name="show-eyebrow" checked onchange="refreshCurrentChart()">
      <span class="toggle-track"></span><span class="toggle-label">Eyebrow</span>
    </label>
    <label class="display-toggle">
      <input type="checkbox" id="show-footer" name="show-footer" checked onchange="refreshCurrentChart()">
      <span class="toggle-track"></span><span class="toggle-label">Footer</span>
    </label>
  </div>

  <!-- Content -->
  <div style="margin-top:0.75rem;">
    <div class="section-head midnight">Content</div>

    <div style="display:flex;flex-direction:column;gap:0.6rem;">
      <!-- Eyebrow -->
      <div class="input-group">
        <label>Eyebrow / Context line</label>
        <input type="text" id="val-eyebrow" name="val-eyebrow"
               value="Program Result &middot; 2025 Renewal"
               oninput="refreshCurrentChart()"
               style="border:1px solid var(--mc-border);border-radius:3px;padding:0.38rem 0.6rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:var(--mc-bg);width:100%;">
      </div>

      <!-- Direction -->
      <div class="input-group">
        <label>Direction</label>
        <input type="hidden" id="cfg-direction" name="cfg-direction" value="down">
        <div id="direction-btns" style="display:flex;gap:0.35rem;"></div>
      </div>

      <!-- Value + Unit on same row -->
      <div style="display:flex;gap:0.6rem;">
        <div class="input-group" style="flex:1;">
          <label>Value</label>
          <input type="text" id="val-value" name="val-value"
                 value="22"
                 oninput="refreshCurrentChart()"
                 style="border:1px solid var(--mc-border);border-radius:3px;padding:0.38rem 0.6rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:var(--mc-bg);width:100%;">
        </div>
        <div class="input-group" style="width:100px;">
          <label>Unit (%, $M...)</label>
          <input type="text" id="val-unit" name="val-unit"
                 value="%"
                 oninput="refreshCurrentChart()"
                 style="border:1px solid var(--mc-border);border-radius:3px;padding:0.38rem 0.6rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:var(--mc-bg);width:100%;">
        </div>
      </div>

      <!-- Label -->
      <div class="input-group">
        <label>Label</label>
        <input type="text" id="val-label" name="val-label"
               value="Premium Reduction"
               oninput="refreshCurrentChart()"
               style="border:1px solid var(--mc-border);border-radius:3px;padding:0.38rem 0.6rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:var(--mc-bg);width:100%;">
      </div>

      <!-- Sublabel -->
      <div class="input-group">
        <label>Sublabel / Detail</label>
        <textarea id="val-sublabel" name="val-sublabel"
                  oninput="refreshCurrentChart()"
                  rows="2"
                  style="border:1px solid var(--mc-border);border-radius:3px;padding:0.38rem 0.6rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:var(--mc-bg);width:100%;resize:vertical;">Achieved vs. prior year expiring premium across all lines</textarea>
      </div>

      <!-- Footer -->
      <div class="input-group">
        <label>Footer note</label>
        <input type="text" id="val-footer" name="val-footer"
               value="Effective July 1, 2025"
               oninput="refreshCurrentChart()"
               style="border:1px solid var(--mc-border);border-radius:3px;padding:0.38rem 0.6rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:var(--mc-bg);width:100%;">
      </div>
    </div>
  </div>

  <!-- Style -->
  <div style="margin-top:1rem;">
    <div class="section-head midnight">Style</div>

    <!-- Accent color swatches -->
    <div class="input-group" style="margin-bottom:0.6rem;">
      <label>Accent Color</label>
      <input type="hidden" id="cfg-accent-color" name="cfg-accent-color" value="#c8102e">
      <div id="color-swatches" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:0.25rem;"></div>
    </div>

    <!-- Card width -->
    <div class="input-group">
      <label>Card Width</label>
      <select id="cfg-card-width" name="cfg-card-width"
              onchange="refreshCurrentChart()"
              style="border:1px solid var(--mc-border);border-radius:3px;padding:0.38rem 0.55rem;font-family:'Noto Sans',sans-serif;font-size:0.83rem;color:var(--mc-text);background:white;width:140px;">
        <option value="400">400 px</option>
        <option value="520" selected>520 px</option>
        <option value="680">680 px</option>
      </select>
    </div>
  </div>

  <!-- Footer -->
  <div class="mc-editor-footer">
    <button class="btn-mc" onclick="refreshCurrentChart()">Refresh Card</button>
  </div>
</div>

<!-- ═══ Script ══════════════════════════════════════════════════════════════ -->
<script>
(function () {
  var MC = ManualChart.COLORS;
  var C  = ManualChart.DATA_COLORS;

  // ── Defaults ────────────────────────────────────────────────────────────
  var defaults = {
    eyebrow:     'Program Result \u00b7 2025 Renewal',
    direction:   'down',
    value:       '22',
    unit:        '%',
    label:       'Premium Reduction',
    sublabel:    'Achieved vs. prior year expiring premium across all lines',
    footer:      'Effective July 1, 2025',
    accentColor: MC.red,
    cardWidth:   520,
  };

  // ── Helpers ─────────────────────────────────────────────────────────────
  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function dirChar(dir) {
    if (dir === 'down') return '\u2193';
    if (dir === 'up')   return '\u2191';
    return '';
  }

  function dirColor(dir) {
    if (dir === 'down') return '#1a7a4a';
    if (dir === 'up')   return MC.red;
    return '#4a5568';
  }

  // ── Direction Buttons ───────────────────────────────────────────────────
  function buildDirectionBtns() {
    var container = document.getElementById('direction-btns');
    var current = document.getElementById('cfg-direction').value || defaults.direction;
    container.innerHTML = '';
    var dirs = [
      { key: 'down', label: '\u2193', color: '#1a7a4a' },
      { key: 'up',   label: '\u2191', color: MC.red },
      { key: 'none', label: '\u2014', color: '#4a5568' },
    ];
    dirs.forEach(function (d) {
      var active = (d.key === current);
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = d.label;
      btn.style.cssText = 'width:36px;height:32px;border-radius:3px;cursor:pointer;font-size:1.1rem;font-weight:700;' +
        'font-family:"Noto Sans",sans-serif;transition:all 0.12s;border:1.5px solid ' +
        (active ? MC.midnight : 'var(--mc-border)') + ';background:' +
        (active ? 'rgba(0,15,71,0.08)' : 'white') + ';color:' + d.color + ';';
      btn.onmouseover = function () { if (!active) btn.style.borderColor = MC.midnight; };
      btn.onmouseout  = function () { if (!active) btn.style.borderColor = 'var(--mc-border)'; };
      btn.onclick = function () {
        document.getElementById('cfg-direction').value = d.key;
        buildDirectionBtns();
        refreshCurrentChart();
      };
      container.appendChild(btn);
    });
  }

  // ── Accent Color Swatches ──────────────────────────────────────────────
  function buildSwatches() {
    var container = document.getElementById('color-swatches');
    var current = document.getElementById('cfg-accent-color').value || defaults.accentColor;
    container.innerHTML = '';
    C.forEach(function (color) {
      var sw = document.createElement('div');
      sw.style.cssText = 'width:22px;height:22px;border-radius:3px;cursor:pointer;border:2px solid ' +
        (color === current ? MC.midnight : 'transparent') + ';background:' + color + ';transition:transform 0.1s;';
      sw.onmouseover = function () { sw.style.transform = 'scale(1.15)'; };
      sw.onmouseout  = function () { sw.style.transform = ''; };
      sw.onclick = function () {
        document.getElementById('cfg-accent-color').value = color;
        buildSwatches();
        refreshCurrentChart();
      };
      container.appendChild(sw);
    });
    // Also add Marsh red (the default accent) if not already in DATA_COLORS
    if (C.indexOf(MC.red) === -1) {
      var sw = document.createElement('div');
      sw.style.cssText = 'width:22px;height:22px;border-radius:3px;cursor:pointer;border:2px solid ' +
        (MC.red === current ? MC.midnight : 'transparent') + ';background:' + MC.red + ';transition:transform 0.1s;';
      sw.onmouseover = function () { sw.style.transform = 'scale(1.15)'; };
      sw.onmouseout  = function () { sw.style.transform = ''; };
      sw.onclick = function () {
        document.getElementById('cfg-accent-color').value = MC.red;
        buildSwatches();
        refreshCurrentChart();
      };
      container.appendChild(sw);
    }
  }

  // ── Build Card HTML ────────────────────────────────────────────────────
  function buildCard() {
    var eyebrow     = document.getElementById('val-eyebrow').value;
    var dir         = document.getElementById('cfg-direction').value || defaults.direction;
    var value       = document.getElementById('val-value').value;
    var unit        = document.getElementById('val-unit').value;
    var label       = document.getElementById('val-label').value;
    var sublabel    = document.getElementById('val-sublabel').value;
    var footer      = document.getElementById('val-footer').value;
    var accentColor = document.getElementById('cfg-accent-color').value || defaults.accentColor;

    var showEyebrow = ManualChart.isToggled('show-eyebrow');
    var showFooter  = ManualChart.isToggled('show-footer');

    var arrow = '';
    if (dir !== 'none') {
      arrow = '<span style="font-family:\'Noto Sans\',sans-serif;font-size:2rem;font-weight:700;line-height:1;color:' +
        dirColor(dir) + ';">' + dirChar(dir) + '</span>';
    }

    var html =
      '<div style="display:grid;grid-template-columns:6px 1fr;min-height:180px;background:#fff;border:1px solid ' + MC.neutral500 + ';border-radius:4px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);">' +
        '<div style="background:' + accentColor + ';"></div>' +
        '<div style="padding:2rem 2rem 1.75rem;display:flex;flex-direction:column;justify-content:space-between;gap:0.75rem;">' +
          // Eyebrow
          (showEyebrow && eyebrow ?
            '<div style="font-family:\'Noto Sans\',sans-serif;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;color:' + MC.neutral750 + ';font-weight:600;">' + esc(eyebrow) + '</div>'
            : '') +
          // Main content block
          '<div>' +
            // Value row
            '<div style="display:flex;align-items:baseline;gap:0.5rem;line-height:1;">' +
              arrow +
              '<span style="font-family:\'Noto Serif\',serif;font-size:3.6rem;color:' + MC.midnight + ';line-height:1;">' + esc(value) + '</span>' +
              (unit ?
                '<span style="font-family:\'Noto Sans\',sans-serif;font-size:1.4rem;color:' + MC.neutral750 + ';font-weight:500;align-self:flex-end;padding-bottom:0.25rem;">' + esc(unit) + '</span>'
                : '') +
            '</div>' +
            // Label
            (label ?
              '<div style="font-family:\'Noto Sans\',sans-serif;font-size:1rem;font-weight:600;color:' + MC.midnight + ';line-height:1.3;margin-top:0.4rem;">' + esc(label) + '</div>'
              : '') +
            // Sublabel
            (sublabel ?
              '<div style="font-family:\'Noto Sans\',sans-serif;font-size:0.78rem;color:' + MC.neutral750 + ';line-height:1.4;margin-top:0.3rem;">' + esc(sublabel) + '</div>'
              : '') +
          '</div>' +
          // Footer
          (showFooter && footer ?
            '<div style="display:flex;align-items:center;gap:0.5rem;padding-top:0.75rem;border-top:1px solid ' + MC.neutral500 + ';margin-top:0.25rem;">' +
              '<span style="font-family:\'Noto Sans\',sans-serif;font-size:0.75rem;color:' + MC.neutral750 + ';">' + esc(footer) + '</span>' +
            '</div>'
            : '') +
        '</div>' +
      '</div>';

    return html;
  }

  // ── refreshCurrentChart — main render entry point ──────────────────────
  window.refreshCurrentChart = function () {
    var container = document.getElementById('stat-card-container');
    var cardWidth = parseInt(document.getElementById('cfg-card-width').value, 10) || defaults.cardWidth;

    container.style.width = cardWidth + 'px';
    container.innerHTML = buildCard();
  };

  // ── Bootstrap ──────────────────────────────────────────────────────────
  setTimeout(function () {
    buildDirectionBtns();
    buildSwatches();
    refreshCurrentChart();
  }, 50);
})();
</script>
