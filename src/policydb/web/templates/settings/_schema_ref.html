<details class="card mb-6" id="schema-ref-details">
  <summary class="p-5 cursor-pointer flex items-center justify-between select-none">
    <div>
      <h2 class="font-semibold text-gray-900 text-sm inline">Schema Reference</h2>
      <span class="text-xs text-gray-400 ml-2">Live table structure from PRAGMA — always current</span>
    </div>
    <svg class="w-4 h-4 text-gray-400 transition-transform" id="schema-ref-chevron"
      fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
    </svg>
  </summary>

  <div class="px-5 pb-5">
    <!-- Table picker -->
    <div class="flex items-end gap-3 mb-4">
      <div>
        <label class="text-[10px] text-gray-500 block mb-0.5 font-medium uppercase tracking-wide">Table</label>
        <select id="schema-table-select"
          onchange="schemaLoadTable(this.value)"
          class="border border-gray-200 rounded-lg px-2.5 py-1.5 text-xs text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-marsh min-w-[220px]">
          <option value="">— select a table —</option>
          {% for tbl in db_tables %}
          <option value="{{ tbl }}">{{ tbl }}</option>
          {% endfor %}
        </select>
      </div>
      <p id="schema-row-count" class="text-xs text-gray-400 pb-1.5"></p>
    </div>

    <!-- Schema output -->
    <div id="schema-output" class="hidden space-y-4">
      <!-- Columns table -->
      <div>
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Columns</p>
        <div class="overflow-x-auto rounded-lg border border-gray-200">
          <table class="min-w-full divide-y divide-gray-200 text-xs">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-3 py-2 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wide">Name</th>
                <th class="px-3 py-2 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wide">Type</th>
                <th class="px-3 py-2 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wide">PK</th>
                <th class="px-3 py-2 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wide">Nullable</th>
                <th class="px-3 py-2 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wide">Default</th>
              </tr>
            </thead>
            <tbody id="schema-columns-body" class="divide-y divide-gray-100 bg-white"></tbody>
          </table>
        </div>
      </div>

      <!-- Indexes -->
      <div id="schema-indexes-section" class="hidden">
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Indexes</p>
        <div class="overflow-x-auto rounded-lg border border-gray-200">
          <table class="min-w-full divide-y divide-gray-200 text-xs">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-3 py-2 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wide">Name</th>
                <th class="px-3 py-2 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wide">Unique</th>
              </tr>
            </thead>
            <tbody id="schema-indexes-body" class="divide-y divide-gray-100 bg-white"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Error -->
    <div id="schema-error" class="hidden p-3 bg-red-50 border border-red-200 rounded-lg">
      <p class="text-xs font-semibold text-red-700 mb-0.5">Error</p>
      <p id="schema-error-msg" class="text-xs text-red-600 font-mono"></p>
    </div>
  </div>
</details>

<script>
(function() {
  var details = document.getElementById('schema-ref-details');
  var chevron = document.getElementById('schema-ref-chevron');
  if (details && chevron) {
    details.addEventListener('toggle', function() {
      chevron.style.transform = details.open ? 'rotate(180deg)' : 'rotate(0deg)';
    });
  }

  window.schemaLoadTable = function(table) {
    var output = document.getElementById('schema-output');
    var errorDiv = document.getElementById('schema-error');
    var rowCount = document.getElementById('schema-row-count');
    output.classList.add('hidden');
    errorDiv.classList.add('hidden');
    rowCount.textContent = '';

    if (!table) return;

    fetch('/settings/db/schema?table=' + encodeURIComponent(table))
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.ok === false) {
          document.getElementById('schema-error-msg').textContent = d.error;
          errorDiv.classList.remove('hidden');
          return;
        }

        rowCount.textContent = d.row_count.toLocaleString() + ' row' + (d.row_count !== 1 ? 's' : '');

        // Render columns
        var tbody = document.getElementById('schema-columns-body');
        tbody.innerHTML = '';
        d.columns.forEach(function(col) {
          var tr = document.createElement('tr');
          tr.className = 'hover:bg-gray-50';
          var cells = [
            {val: col.name, cls: 'font-medium text-gray-800'},
            {val: col.type || '—', cls: 'text-gray-600 font-mono'},
            {val: col.pk ? '✓' : '', cls: col.pk ? 'text-marsh font-semibold' : 'text-gray-300'},
            {val: col.nullable ? 'yes' : 'no', cls: col.nullable ? 'text-gray-400' : 'text-gray-700'},
            {val: col.default !== null && col.default !== undefined ? String(col.default) : '—', cls: 'text-gray-400 font-mono'},
          ];
          cells.forEach(function(c) {
            var td = document.createElement('td');
            td.textContent = c.val;
            td.className = 'px-3 py-1.5 ' + c.cls;
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });

        // Render indexes
        var idxSection = document.getElementById('schema-indexes-section');
        var idxBody = document.getElementById('schema-indexes-body');
        idxBody.innerHTML = '';
        if (d.indexes && d.indexes.length > 0) {
          d.indexes.forEach(function(idx) {
            var tr = document.createElement('tr');
            tr.className = 'hover:bg-gray-50';
            [{val: idx.name, cls: 'font-mono text-gray-700'}, {val: idx.unique ? 'yes' : '', cls: idx.unique ? 'text-marsh font-semibold' : 'text-gray-300'}]
              .forEach(function(c) {
                var td = document.createElement('td');
                td.textContent = c.val;
                td.className = 'px-3 py-1.5 ' + c.cls;
                tr.appendChild(td);
              });
            idxBody.appendChild(tr);
          });
          idxSection.classList.remove('hidden');
        } else {
          idxSection.classList.add('hidden');
        }

        output.classList.remove('hidden');
      })
      .catch(function(e) {
        document.getElementById('schema-error-msg').textContent = 'Request failed: ' + e;
        errorDiv.classList.remove('hidden');
      });
  };
})();
</script>
