<details class="card mb-6" id="sql-console-details">
  <summary class="p-5 cursor-pointer flex items-center justify-between select-none">
    <div>
      <h2 class="font-semibold text-gray-900 text-sm inline">SQL Console</h2>
      <span class="text-xs text-gray-400 ml-2">Run ad-hoc queries directly against the database</span>
    </div>
    <svg class="w-4 h-4 text-gray-400 transition-transform" style="transform: rotate(0deg);" id="sql-console-chevron"
      fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
    </svg>
  </summary>

  <div class="px-5 pb-5">
    <!-- Toolbar row -->
    <div class="flex flex-wrap items-end gap-3 mb-3">
      <!-- Examples dropdown -->
      <div>
        <label class="text-[10px] text-gray-500 block mb-0.5 font-medium uppercase tracking-wide">Example</label>
        <select id="sql-example-select"
          onchange="sqlLoadExample(this)"
          class="border border-gray-200 rounded-lg px-2.5 py-1.5 text-xs text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-marsh min-w-[220px]">
          <option value="">— pick an example —</option>
          {% for ex in sql_examples %}
          <option value="{{ ex.sql | e }}">{{ ex.label }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Write mode toggle -->
      <div class="flex items-center gap-2 ml-auto">
        <label class="text-xs text-gray-600 font-medium" for="sql-write-toggle">Write mode</label>
        <button type="button" role="switch" id="sql-write-toggle" aria-checked="false"
          onclick="sqlToggleWrite()"
          class="relative inline-flex h-5 w-9 items-center rounded-full border-2 border-transparent transition-colors focus:outline-none focus:ring-2 focus:ring-marsh bg-gray-200"
          title="Enable to run INSERT / UPDATE / DELETE">
          <span class="inline-block h-3.5 w-3.5 transform rounded-full bg-white shadow transition-transform translate-x-0.5"></span>
        </button>
        <span id="sql-write-label" class="text-xs text-gray-400">Read-only</span>
      </div>
    </div>

    <!-- SQL textarea -->
    <div class="mb-3">
      <textarea id="sql-input" rows="5" spellcheck="false"
        placeholder="SELECT policy_uid, carrier, expiration_date FROM policies WHERE archived = 0 LIMIT 20"
        class="w-full font-mono text-xs border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-marsh resize-y leading-relaxed text-gray-800 bg-gray-50 placeholder-gray-300"></textarea>
    </div>

    <!-- Action buttons -->
    <div class="flex items-center gap-2 mb-4">
      <button type="button" onclick="sqlRunQuery()"
        class="text-xs bg-marsh text-white hover:bg-marsh-light px-4 py-1.5 rounded-lg font-medium transition-colors">
        Run Query
      </button>
      <button type="button" onclick="sqlExportCSV()"
        class="text-xs bg-white text-gray-700 hover:bg-gray-50 border border-gray-300 px-3 py-1.5 rounded-lg font-medium transition-colors">
        Export CSV
      </button>
      <span id="sql-status" class="text-xs text-gray-400 ml-1"></span>
    </div>

    <!-- Write-mode warning banner -->
    <div id="sql-write-warning" class="hidden mb-3 p-2.5 bg-amber-50 border border-amber-200 rounded-lg">
      <p class="text-xs text-amber-700 font-medium">Write mode enabled — INSERT, UPDATE, and DELETE will be committed to the live database. Use with caution.</p>
    </div>

    <!-- Results area -->
    <div id="sql-results" class="hidden">
      <div class="flex items-center justify-between mb-1.5">
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Results</p>
        <p id="sql-meta" class="text-xs text-gray-400"></p>
      </div>
      <div class="overflow-x-auto rounded-lg border border-gray-200 max-h-96">
        <table id="sql-table" class="min-w-full divide-y divide-gray-200 text-xs">
          <thead id="sql-thead" class="bg-gray-50 sticky top-0"></thead>
          <tbody id="sql-tbody" class="divide-y divide-gray-100 bg-white"></tbody>
        </table>
      </div>
    </div>

    <!-- Error area -->
    <div id="sql-error" class="hidden p-3 bg-red-50 border border-red-200 rounded-lg">
      <p class="text-xs font-semibold text-red-700 mb-0.5">Query Error</p>
      <p id="sql-error-msg" class="text-xs text-red-600 font-mono break-all"></p>
    </div>
  </div>
</details>

<script>
(function() {
  // Chevron rotation on open/close
  var details = document.getElementById('sql-console-details');
  var chevron = document.getElementById('sql-console-chevron');
  if (details && chevron) {
    details.addEventListener('toggle', function() {
      chevron.style.transform = details.open ? 'rotate(180deg)' : 'rotate(0deg)';
    });
  }

  var _writeMode = false;

  window.sqlToggleWrite = function() {
    _writeMode = !_writeMode;
    var btn = document.getElementById('sql-write-toggle');
    var lbl = document.getElementById('sql-write-label');
    var warn = document.getElementById('sql-write-warning');
    if (_writeMode) {
      btn.setAttribute('aria-checked', 'true');
      btn.classList.remove('bg-gray-200');
      btn.classList.add('bg-amber-400');
      btn.querySelector('span').classList.remove('translate-x-0.5');
      btn.querySelector('span').classList.add('translate-x-4');
      lbl.textContent = 'Write mode ON';
      lbl.classList.remove('text-gray-400');
      lbl.classList.add('text-amber-600');
      warn.classList.remove('hidden');
    } else {
      btn.setAttribute('aria-checked', 'false');
      btn.classList.add('bg-gray-200');
      btn.classList.remove('bg-amber-400');
      btn.querySelector('span').classList.add('translate-x-0.5');
      btn.querySelector('span').classList.remove('translate-x-4');
      lbl.textContent = 'Read-only';
      lbl.classList.add('text-gray-400');
      lbl.classList.remove('text-amber-600');
      warn.classList.add('hidden');
    }
  };

  window.sqlLoadExample = function(sel) {
    var val = sel.value;
    if (!val) return;
    document.getElementById('sql-input').value = val;
    sel.value = '';
  };

  function _sqlSetStatus(msg, cls) {
    var el = document.getElementById('sql-status');
    el.textContent = msg;
    el.className = 'text-xs ml-1 ' + (cls || 'text-gray-400');
  }

  function _sqlHideResults() {
    document.getElementById('sql-results').classList.add('hidden');
    document.getElementById('sql-error').classList.add('hidden');
  }

  function _sqlShowError(msg) {
    _sqlHideResults();
    var errDiv = document.getElementById('sql-error');
    document.getElementById('sql-error-msg').textContent = msg;
    errDiv.classList.remove('hidden');
  }

  function _sqlRenderTable(columns, rows) {
    var thead = document.getElementById('sql-thead');
    var tbody = document.getElementById('sql-tbody');
    thead.innerHTML = '';
    tbody.innerHTML = '';

    var tr = document.createElement('tr');
    columns.forEach(function(col) {
      var th = document.createElement('th');
      th.textContent = col;
      th.className = 'px-3 py-2 text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wide whitespace-nowrap';
      tr.appendChild(th);
    });
    thead.appendChild(tr);

    rows.forEach(function(row) {
      var tr2 = document.createElement('tr');
      tr2.className = 'hover:bg-gray-50';
      row.forEach(function(cell) {
        var td = document.createElement('td');
        td.textContent = cell === null ? 'NULL' : cell;
        td.className = 'px-3 py-1.5 text-gray-700 whitespace-nowrap max-w-xs truncate' + (cell === null ? ' text-gray-300 italic' : '');
        tr2.appendChild(td);
      });
      tbody.appendChild(tr2);
    });

    document.getElementById('sql-results').classList.remove('hidden');
    document.getElementById('sql-error').classList.add('hidden');
  }

  window.sqlRunQuery = function() {
    var sql = document.getElementById('sql-input').value.trim();
    if (!sql) { _sqlSetStatus('Enter a query first.', 'text-gray-400'); return; }
    _sqlSetStatus('Running…', 'text-gray-400');
    _sqlHideResults();

    fetch('/settings/db/query', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({sql: sql, write_mode: _writeMode})
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) {
        _sqlSetStatus('', '');
        _sqlShowError(d.error);
        return;
      }
      var meta = d.row_count + ' row' + (d.row_count !== 1 ? 's' : '') + ' \u00b7 ' + d.duration_ms + ' ms';
      if (d.row_count === 1000) meta += ' (limit reached)';
      document.getElementById('sql-meta').textContent = meta;
      _sqlSetStatus(meta, 'text-green-600');
      _sqlRenderTable(d.columns, d.rows);
    })
    .catch(function(e) {
      _sqlSetStatus('', '');
      _sqlShowError('Request failed: ' + e);
    });
  };

  window.sqlExportCSV = function() {
    var sql = document.getElementById('sql-input').value.trim();
    if (!sql) { _sqlSetStatus('Enter a query first.', 'text-gray-400'); return; }
    var url = '/settings/db/query/export?sql=' + encodeURIComponent(sql);
    window.location.href = url;
  };
})();
</script>
