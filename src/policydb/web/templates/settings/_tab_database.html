<div class="space-y-6">
  <div id="section-db-health">
    {% include 'settings/_db_health.html' %}
  </div>
  <div id="section-sql-console">
    {% include 'settings/_sql_console.html' %}
  </div>
  <div id="section-schema-ref">
    {% include 'settings/_schema_ref.html' %}
  </div>

  <div class="border-t border-gray-200 pt-6 mt-2">
    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-4">Dropdown Lists</p>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      {% for key, label in tab_lists.items() %}
      {% set items = lists[key] %}
      {% set excluded_items = [] %}
      {% include "settings/_list_card.html" %}
      {% endfor %}
    </div>
  </div>
</div>
