<div id="billing-card" class="card p-4">
  <div class="flex items-center justify-between mb-3">
    <h2 class="font-semibold text-gray-900 text-sm">Billing Accounts
      <span class="normal-case font-normal text-gray-400 text-xs">&mdash; master &amp; alternate billing IDs</span>
    </h2>
    <button type="button" class="text-xs text-marsh hover:underline font-medium no-print"
      onclick="if(window._billingMatrix)window._billingMatrix.createNewRow()">+ Add</button>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full text-sm table-fixed">
      <colgroup>
        <col style="width:12%"><col style="width:22%"><col style="width:13%"><col style="width:28%"><col style="width:65px"><col style="width:30px">
      </colgroup>
      <thead>
        <tr class="text-left text-xs text-gray-400 uppercase tracking-wide border-b border-gray-100 bg-gray-50">
          <th class="px-3 py-2">Billing ID</th>
          <th class="px-3 py-2">Entity Name</th>
          <th class="px-3 py-2">FEIN</th>
          <th class="px-3 py-2">Description</th>
          <th class="px-3 py-2 text-center">Type</th>
          <th class="px-3 py-2"></th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-50" id="billing-tbody-{{ client.id }}">
        {% for b in billing_accounts %}
        {% include "clients/_billing_row.html" %}
        {% else %}
        <tr id="billing-empty-{{ client.id }}"><td colspan="6" class="px-4 py-6 text-center text-gray-400 text-xs">No billing accounts yet.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

<script>
(function() {
  var CID = "{{ client.id }}";
  window._billingMatrix = window.initMatrix({
    tbodyId: 'billing-tbody-' + CID,
    idAttr: 'data-row-id',
    rowClass: 'matrix-row',
    patchUrl: function(id) { return '/clients/' + CID + '/billing/' + id + '/cell'; },
    addRowUrl: '/clients/' + CID + '/billing/add-row',
    emptyRowId: 'billing-empty-' + CID,
  });
})();
</script>
