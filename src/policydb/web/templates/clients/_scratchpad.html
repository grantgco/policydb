<div id="client-scratchpad-{{ client.id }}" class="card p-4">
  <div class="flex items-center justify-between mb-2">
    <h2 class="font-semibold text-gray-900">Working Notes</h2>
    <span id="scratch-ts-{{ client.id }}" class="text-xs text-gray-400 italic">
      {% if client_scratchpad_updated %}saved {{ client_scratchpad_updated[:16] }}{% endif %}
    </span>
  </div>
  <textarea
    id="scratch-ta-{{ client.id }}"
    name="content"
    rows="4"
    placeholder="Working notes about this client — type here, then pin with Save Note…"
    class="w-full text-sm text-gray-800 bg-transparent resize-none focus:outline-none placeholder-gray-300 leading-relaxed">
{{ client_scratchpad or '' }}</textarea>
  <div class="flex justify-end gap-1 mt-1">
    <button type="button" id="scratch-log-{{ client.id }}"
      onclick="logScratchCombined('client', '{{ client.id }}')"
      {% if not client_scratchpad or not client_scratchpad.strip() %}disabled{% endif %}
      class="text-xs bg-marsh text-white px-3 py-1 rounded hover:bg-marsh-light disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
      Log as Activity
    </button>
    <button type="button" id="scratch-clear-{{ client.id }}"
      onclick="clearScratch('client', '{{ client.id }}')"
      {% if not client_scratchpad or not client_scratchpad.strip() %}disabled{% endif %}
      class="text-xs text-gray-400 border border-gray-200 px-3 py-1 rounded hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
      Clear
    </button>
  </div>

</div>

<script>
(function() {
  var CID = "{{ client.id }}";
  var ta = document.getElementById('scratch-ta-' + CID);
  var ts = document.getElementById('scratch-ts-' + CID);
  var logBtn = document.getElementById('scratch-log-' + CID);
  var clearBtn = document.getElementById('scratch-clear-' + CID);
  if (!ta) return;

  function updateBtns() {
    var hasContent = (ta.value || '').trim().length > 0;
    if (logBtn) logBtn.disabled = !hasContent;
    if (clearBtn) clearBtn.disabled = !hasContent;
  }

  var mde = window.initMarkdownEditor('scratch-ta-' + CID, {minHeight: '100px'});

  var saveTimer = null;
  var saving = false;
  function autoSave() {
    if (saving) return;
    saving = true;
    var fd = new FormData();
    fd.set('content', ta.value);
    fetch('/clients/' + CID + '/scratchpad', {
      method: 'POST', body: fd,
      headers: {'Accept': 'application/json'}
    }).then(function(r) { return r.json(); }).then(function(data) {
      if (data.ok && ts) ts.textContent = 'saved ' + data.saved_at;
    }).catch(function() {}).finally(function() { saving = false; });
  }

  if (mde) {
    mde.on('change', function() {
      updateBtns();
      clearTimeout(saveTimer);
      saveTimer = setTimeout(autoSave, 800);
    });
  } else {
    ta.addEventListener('input', function() {
      updateBtns();
      clearTimeout(saveTimer);
      saveTimer = setTimeout(autoSave, 800);
    });
  }

  if (typeof renderMarkdown === 'function') renderMarkdown('.md-render');
})();

/* Combined: log activity + save note + clear scratchpad */
window.logScratchCombined = function(source, scopeId) {
  var ta = document.getElementById('scratch-ta-' + scopeId);
  if (!ta || !ta.value.trim()) return;
  var fd = new FormData();
  fd.set('source', source);
  fd.set('scope_id', scopeId);
  fd.set('activity_type', 'Note');
  fd.set('subject', 'Working note');
  fd.set('details', ta.value.trim());
  fetch('/inbox/scratchpad/process', {method: 'POST', body: fd})
    .then(function(r) {
      if (r.ok) {
        ta.value = '';
        var logBtn = document.getElementById('scratch-log-' + scopeId);
        var clearBtn = document.getElementById('scratch-clear-' + scopeId);
        if (logBtn) logBtn.disabled = true;
        if (clearBtn) clearBtn.disabled = true;
        var ts = document.getElementById('scratch-ts-' + scopeId);
        if (ts) ts.textContent = 'processed';
        if (typeof showToast === 'function') showToast('Note logged as activity + saved', true);
      }
    })
    .catch(function() { if (typeof showToast === 'function') showToast('Failed to process', false); });
};

window.clearScratch = function(source, scopeId) {
  var ta = document.getElementById('scratch-ta-' + scopeId);
  if (!ta) return;
  var fd = new FormData();
  fd.set('source', source);
  fd.set('scope_id', scopeId);
  fetch('/inbox/scratchpad/clear', {method: 'POST', body: fd})
    .then(function(r) {
      if (r.ok) {
        ta.value = '';
        var logBtn = document.getElementById('scratch-log-' + scopeId);
        var clearBtn = document.getElementById('scratch-clear-' + scopeId);
        if (logBtn) logBtn.disabled = true;
        if (clearBtn) clearBtn.disabled = true;
        var ts = document.getElementById('scratch-ts-' + scopeId);
        if (ts) ts.textContent = 'cleared';
        if (typeof showToast === 'function') showToast('Scratchpad cleared', true);
      }
    })
    .catch(function() { if (typeof showToast === 'function') showToast('Failed to clear', false); });
};
</script>
