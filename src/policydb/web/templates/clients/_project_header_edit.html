<div class="proj-hdr-wrap px-4 py-3 bg-blue-50 border-b border-marsh">
  <form
    hx-post="/clients/{{ client.id }}/project-note"
    hx-target="closest .proj-hdr-wrap"
    hx-swap="outerHTML"
    class="space-y-2">
    <input type="hidden" name="project_name" value="{{ project_name }}">

    <!-- Address row -->
    <div class="grid grid-cols-4 gap-2">
      <div class="col-span-2">
        <p class="text-xs text-gray-500 mb-0.5">Street Address</p>
        <input type="text" name="exposure_address" value="{{ exposure_address or '' }}"
          placeholder="123 Main St"
          class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
      </div>
      <div>
        <p class="text-xs text-gray-500 mb-0.5">City</p>
        <input type="text" name="exposure_city" value="{{ exposure_city or '' }}"
          class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
      </div>
      <div class="grid grid-cols-2 gap-2">
        <div>
          <p class="text-xs text-gray-500 mb-0.5">State</p>
          <input type="text" name="exposure_state" value="{{ exposure_state or '' }}"
            maxlength="2" placeholder="TX"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh uppercase">
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">ZIP</p>
          <input type="text" name="exposure_zip" value="{{ exposure_zip or '' }}"
            placeholder="78701"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
        </div>
      </div>
    </div>

    <!-- Notes row -->
    <div>
      <p class="text-xs text-gray-500 mb-0.5">Project Notes</p>
      <textarea name="notes" rows="2" autofocus
        placeholder="Notes about this location that apply to all policies here…"
        class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">{{ note }}</textarea>
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-3">
      <button type="submit"
        class="bg-marsh hover:bg-marsh-light text-white text-xs font-medium px-3 py-1.5 rounded">Save</button>
      <button type="button"
        hx-get="/clients/{{ client.id }}/project-note?project={{ project_name | urlencode }}"
        hx-target="closest .proj-hdr-wrap"
        hx-swap="outerHTML"
        class="text-xs text-gray-500 hover:underline">Cancel</button>
      <p class="text-xs text-gray-400 italic ml-2">Address will be applied to all policies in this project.</p>
    </div>

  </form>
</div>
