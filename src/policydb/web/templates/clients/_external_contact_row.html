{# Single external stakeholder row — returned by add-row endpoint for initMatrix() #}
<tr data-row-id="{{ c.id }}" class="matrix-row group hover:bg-gray-50/60 align-top">
  <td class="px-3 py-2.5">
    <div class="flex items-center gap-1">
      <div contenteditable="true"
           class="matrix-cell-editable outline-none font-medium text-gray-800 rounded px-1 -mx-1 text-sm flex-1"
           data-field="name" data-placeholder="Name...">{{ c.name or '' }}</div>
      <a href="/contacts/{{ c.contact_id }}" class="text-gray-300 hover:text-marsh text-xs flex-shrink-0 no-print" title="Open detail" onclick="event.stopPropagation()">&#8594;</a>
    </div>
  </td>
  <td class="matrix-cell-combo px-3 py-2.5 cursor-pointer relative"
      data-field="organization"
      data-options='{{ all_orgs | tojson }}'>
    <span class="cell-display text-gray-600 text-xs">{{ c.organization or '—' }}</span>
  </td>
  <td class="matrix-cell-combo px-3 py-2.5 cursor-pointer relative"
      data-field="role"
      data-options='{{ contact_roles | tojson }}'>
    <span class="cell-display">
      {% if c.role %}<span class="text-xs text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded">{{ c.role }}</span>
      {% else %}<span class="text-gray-300 text-xs">—</span>{% endif %}
    </span>
  </td>
  <td class="px-3 py-2.5">
    <div contenteditable="true"
         class="matrix-cell-editable outline-none text-gray-500 text-xs rounded px-1 -mx-1"
         data-field="notes" data-placeholder="Notes...">{{ c.notes or '' }}</div>
  </td>
  <td class="matrix-cell-email px-3 py-2.5 cursor-pointer" data-field="email">
    <span class="cell-display text-xs">
      {% if c.email %}<a href="mailto:{{ c.email }}{% if mailto_subject %}?subject={{ mailto_subject | urlencode }}{% endif %}" class="text-marsh hover:underline" onclick="event.stopPropagation()">{{ c.email }}</a>
      {% else %}<span class="text-gray-300">—</span>{% endif %}
    </span>
  </td>
  <td class="px-3 py-2.5 whitespace-nowrap">
    <div contenteditable="true"
         class="matrix-cell-editable outline-none text-gray-600 text-xs rounded px-1 -mx-1"
         data-field="phone" data-placeholder="Phone...">{{ c.phone or '' }}</div>
  </td>
  <td class="px-3 py-2.5 whitespace-nowrap">
    <div contenteditable="true"
         class="matrix-cell-editable outline-none text-gray-400 text-xs rounded px-1 -mx-1"
         data-field="mobile" data-placeholder="Cell...">{{ c.mobile or '' }}</div>
  </td>
  <td class="px-3 py-2.5 text-center">
    <button hx-post="/clients/{{ client.id }}/external/{{ c.id }}/delete"
      hx-target="#external-contacts-card" hx-swap="outerHTML"
      hx-confirm="Remove {{ c.name }}?"
      class="text-xs text-gray-300 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity">&#10005;</button>
  </td>
</tr>
