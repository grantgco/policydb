{% extends "base.html" %}
{% block title %}Clients — PolicyDB{% endblock %}
{% block content %}

<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-gray-900">Clients</h1>
  <a href="/clients/new" class="bg-marsh hover:bg-marsh-light text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">+ Add Client</a>
</div>

<!-- Search -->
<div class="mb-4">
  <input type="search" name="q" placeholder="Search clients…"
    hx-get="/clients/search"
    hx-trigger="keyup changed delay:300ms, search"
    hx-target="#client-table-body"
    hx-include="this"
    class="w-full sm:w-80 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-marsh"
    value="{{ q or '' }}">
</div>

<div class="card overflow-hidden">
  <table class="w-full text-sm">
    <thead>
      <tr class="border-b border-gray-200 text-left text-xs text-gray-500 uppercase tracking-wide bg-gray-50">
        <th class="px-4 py-3">Client</th>
        <th class="px-4 py-3">Segment</th>
        <th class="px-4 py-3 text-right">Policies</th>
        <th class="px-4 py-3 text-right">Total Premium</th>
        <th class="px-4 py-3 text-right">Next Renewal</th>
        <th class="px-4 py-3 text-right">Activity (90d)</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-100" id="client-table-body">
      {% include "clients/_table_rows.html" %}
    </tbody>
  </table>
</div>

{% endblock %}
