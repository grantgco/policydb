{# Reusable ref tag pill — one-click copy to clipboard as [PDB:...] format.
   Usage: {% set _pill_tag = build_ref_tag(cn_number=..., client_id=..., policy_uid=..., project_id=...) %}
          {% with ref_tag=_pill_tag %}{% include "_ref_tag_pill.html" %}{% endwith %}
#}
{% if ref_tag %}
<button type="button" onclick="copyRefTag(this, '{{ ref_tag }}')"
  class="inline-flex items-center gap-1 text-[11px] font-mono text-gray-500 hover:text-marsh
         bg-gray-50 hover:bg-gray-100 border border-gray-200 hover:border-marsh/40
         rounded-full px-2.5 py-0.5 cursor-pointer transition-colors whitespace-nowrap no-print"
  title="Click to copy email ref tag">
  <svg class="w-3 h-3 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
      d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
  </svg>
  {{ ref_tag }}
</button>
{% endif %}
