{% extends "base.html" %}
{% block title %}Logs — Coverage{% endblock %}
{% block content %}

<div class="mb-6 flex items-center justify-between">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Logs</h1>
    <p class="text-sm text-gray-500 mt-1">Application events and database change history. Entries older than {{ retention_days }} days are purged on startup.</p>
  </div>
</div>

<!-- Tabs -->
<div class="border-b border-gray-200 mb-6" id="log-tabs">
  <nav class="flex gap-6 -mb-px" role="tablist">
    <button type="button"
            class="tab-btn pb-3 text-sm font-medium border-b-2 transition-colors"
            data-tab="app"
            onclick="switchLogTab('app')">
      App Log
    </button>
    <button type="button"
            class="tab-btn pb-3 text-sm font-medium border-b-2 transition-colors"
            data-tab="audit"
            onclick="switchLogTab('audit')">
      Audit Log
    </button>
  </nav>
</div>

<!-- Tab content -->
<div id="tab-app" class="tab-panel"></div>
<div id="tab-audit" class="tab-panel hidden"></div>

<script>
(function() {
  var defaultTab = '{{ default_tab }}';
  var loaded = {};

  window.switchLogTab = function(tab) {
    // Toggle visibility
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.add('hidden'); });
    document.getElementById('tab-' + tab).classList.remove('hidden');

    // Toggle active tab style
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      if (btn.getAttribute('data-tab') === tab) {
        btn.classList.add('border-blue-600', 'text-blue-600');
        btn.classList.remove('border-transparent', 'text-gray-500', 'hover:text-gray-700');
      } else {
        btn.classList.remove('border-blue-600', 'text-blue-600');
        btn.classList.add('border-transparent', 'text-gray-500', 'hover:text-gray-700');
      }
    });

    // Lazy-load tab content
    if (!loaded[tab]) {
      loaded[tab] = true;
      var url = '/logs/' + tab;
      htmx.ajax('GET', url, { target: '#tab-' + tab, swap: 'innerHTML' });
    }

    // Remember tab
    try { sessionStorage.setItem('logs_tab', tab); } catch(e) {}
  };

  // Restore last tab or use default
  var savedTab = null;
  try { savedTab = sessionStorage.getItem('logs_tab'); } catch(e) {}
  switchLogTab(savedTab || defaultTab);
})();
</script>

{% endblock %}
