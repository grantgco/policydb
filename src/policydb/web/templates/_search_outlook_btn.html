{# Reusable "Search Outlook" button.
   Caller supplies:
     entity_type: "client" | "policy" | "issue" | "project" | "program"
     entity_id:   string — the UID or numeric id (as string) #}
<button type="button"
        class="btn-secondary text-xs no-print inline-flex items-center gap-1"
        data-entity-type="{{ entity_type }}"
        data-entity-id="{{ entity_id }}"
        onclick="searchOutlookForRecord(this, event)"
        title="Find correspondence about this {{ entity_type }} and its direct relatives. Shift-click to search all correspondence for the client.">
  <span>🔍</span>
  <span>Search Outlook</span>
</button>
