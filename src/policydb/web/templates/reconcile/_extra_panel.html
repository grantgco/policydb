<div class="mt-3 border border-blue-200 bg-blue-50 rounded-lg p-3">
  <p class="text-xs font-semibold text-blue-800 mb-2">This policy is in PolicyDB but was not found in your uploaded file.</p>
  <p class="text-xs text-blue-700 mb-3">If this policy was in your AMS export under a different client name or coverage name, re-run reconciliation with a broader scope. Otherwise you can archive it if it was entered in error.</p>
  <div class="flex gap-2">
    <a href="/policies/{{ policy_uid }}/edit"
      class="text-xs border border-marsh text-marsh px-3 py-1 rounded hover:bg-marsh hover:text-white transition-colors">
      Edit Policy →
    </a>
    <button
      hx-post="/reconcile/archive/{{ policy_uid }}"
      hx-target="closest tr"
      hx-swap="outerHTML"
      hx-confirm="Archive {{ db.policy_type }} ({{ db.carrier }}) for {{ db.client_name }}? This can be undone from the policy edit page."
      class="text-xs border border-red-300 text-red-600 px-3 py-1 rounded hover:bg-red-50 transition-colors">
      Archive Policy
    </button>
  </div>
</div>
