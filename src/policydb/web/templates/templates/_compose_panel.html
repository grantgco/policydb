{% if not available %}
<div class="p-4 text-sm text-gray-400 text-center">
  No email templates yet. <a href="/templates" class="text-marsh hover:underline">Create one →</a>
</div>
{% else %}
<div class="p-4 space-y-3">
  <div class="flex items-end gap-3">
    <div class="flex-1">
      <label class="text-xs font-medium text-gray-500 block mb-1">Select Template</label>
      <select id="compose-tpl-select-{{ context }}-{{ policy_uid or client_id }}"
        class="w-full border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-marsh"
        onchange="loadComposedTemplate(this)">
        <option value="">— Choose a template —</option>
        {% set prev_ctx = '' %}
        {% for tpl in available %}
        {% if tpl.context != prev_ctx %}
        {% if prev_ctx %}</optgroup>{% endif %}
        <optgroup label="{{ {'policy': 'Policy Templates', 'client': 'Client Templates', 'general': 'General'}[tpl.context] or tpl.context }}">
        {% set prev_ctx = tpl.context %}
        {% endif %}
        <option value="{{ tpl.id }}" {% if selected_template and selected_template.id == tpl.id %}selected{% endif %}>{{ tpl.name }}</option>
        {% endfor %}
        {% if available %}</optgroup>{% endif %}
      </select>
    </div>
  </div>

  <!-- Rendered output area -->
  <div id="compose-rendered-{{ context }}-{{ policy_uid or client_id }}">
    {% if selected_template %}
    {% include "templates/_compose_rendered.html" %}
    {% endif %}
  </div>
</div>

<script>
function loadComposedTemplate(select) {
  var tplId = select.value;
  var areaId = 'compose-rendered-{{ context }}-{{ policy_uid or client_id }}';
  if (!tplId) {
    document.getElementById(areaId).innerHTML = '';
    return;
  }
  var url = '/templates/render?template_id=' + tplId +
    '{% if policy_uid %}&policy_uid={{ policy_uid }}{% endif %}' +
    '{% if client_id %}&client_id={{ client_id }}{% endif %}';
  htmx.ajax('GET', url, { target: '#' + areaId, swap: 'innerHTML' });
}
</script>
{% endif %}
