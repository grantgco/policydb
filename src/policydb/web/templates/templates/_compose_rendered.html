{% set render_uid = (selected_template.id | string) ~ '-' ~ (policy_uid or client_id | string) %}
<div class="space-y-3 border-t border-gray-100 pt-3 mt-1">

  <!-- Recipient selector -->
  {% if all_contacts %}
  <div>
    <label class="text-xs font-medium text-gray-500 block mb-1">To (select recipients)</label>
    <div class="space-y-1 max-h-36 overflow-y-auto border border-gray-200 rounded-lg p-2 bg-gray-50" id="recipient-list-{{ render_uid }}">
      {% for c in all_contacts %}
      <label class="flex items-center gap-2 py-0.5 cursor-pointer hover:bg-white rounded px-1 transition-colors">
        <input type="checkbox" class="compose-recipient rounded border-gray-300 text-marsh focus:ring-marsh"
          data-email="{{ c.email }}" data-name="{{ c.name }}"
          {% if loop.first or c.source == 'client' %}checked{% endif %}
          onchange="updateComposeRecipients('{{ render_uid }}')">
        <span class="text-sm text-gray-800">{{ c.name }}</span>
        <span class="text-xs text-gray-400">{{ c.email }}</span>
        <span class="text-[10px] {% if c.source == 'internal' %}bg-blue-50 text-blue-600{% elif c.source == 'policy' %}bg-amber-50 text-amber-600{% else %}bg-green-50 text-green-600{% endif %} px-1.5 py-0.5 rounded ml-auto">{{ c.role }}</span>
      </label>
      {% endfor %}
    </div>
  </div>
  {% endif %}

  <!-- Subject row -->
  <div>
    <div class="flex items-center justify-between mb-1">
      <label class="text-xs font-medium text-gray-500">Subject</label>
      <button type="button" onclick="copyRendered('subject-{{ render_uid }}', this)"
        class="text-xs text-marsh hover:underline">Copy</button>
    </div>
    <input id="subject-{{ render_uid }}" type="text" readonly
      value="{{ rendered_subject }}"
      class="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm bg-gray-50 font-mono focus:outline-none select-all cursor-text">
  </div>

  <!-- Body -->
  <div>
    <div class="flex items-center justify-between mb-1">
      <label class="text-xs font-medium text-gray-500">Body</label>
      <div class="flex gap-3">
        <button type="button" onclick="copyRendered('body-{{ render_uid }}', this)"
          class="text-xs text-marsh hover:underline">Copy</button>
        {% if rendered_subject %}
        <button type="button" id="open-mail-{{ render_uid }}" class="ep-trigger text-xs text-gray-400 hover:text-marsh"
          data-to="{{ (all_contacts[0].email if all_contacts else ctx.primary_email) if (all_contacts or ctx) else '' }}"
          data-to-label="{{ (all_contacts[0].name if all_contacts else ctx.primary_contact) if (all_contacts or ctx) else '' }}"
          data-subject="{{ rendered_subject }}"
          data-body="{{ rendered_body | e }}"
          {% if policy_uid %}data-cc-url="/policies/{{ policy_uid }}/team-cc"{% elif client_id %}data-cc-url="/clients/{{ client_id }}/team-cc{% if project_name %}?project={{ project_name | urlencode }}{% endif %}"{% endif %}>Open in Mail &#8594;</button>
        {% endif %}
      </div>
    </div>
    <textarea id="body-{{ render_uid }}" readonly rows="12"
      class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-gray-50 font-mono resize-y focus:outline-none cursor-text">{{ rendered_body }}</textarea>
  </div>

</div>

<script>
function copyRendered(elemId, btn) {
  var el = document.getElementById(elemId);
  if (!el) return;
  var text = el.value;
  navigator.clipboard.writeText(text).then(function() {
    var orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.classList.add('text-green-600');
    setTimeout(function() { btn.textContent = orig; btn.classList.remove('text-green-600'); }, 1800);
  });
}

function updateComposeRecipients(renderUid) {
  var container = document.getElementById('recipient-list-' + renderUid);
  if (!container) return;
  var checked = container.querySelectorAll('input.compose-recipient:checked');
  var toEmails = [];
  var toNames = [];
  checked.forEach(function(cb) {
    toEmails.push(cb.dataset.email);
    toNames.push(cb.dataset.name);
  });
  var mailBtn = document.getElementById('open-mail-' + renderUid);
  if (mailBtn) {
    mailBtn.dataset.to = toEmails.join(',');
    mailBtn.dataset.toLabel = toNames.join(', ');
  }
}
</script>
