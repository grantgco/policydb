{% if entries %}
<div class="absolute z-20 left-0 right-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-lg max-h-48 overflow-y-auto">
  {% for e in entries %}
  <button type="button"
    hx-post="/kb/link-from-entity"
    hx-vals='{"entry_type":"{{ e.entry_type }}", "entry_id":{{ e.id }}, "entity_type":"{{ entity_type }}", "entity_id":{{ entity_id }}}'
    hx-target="#entity-kb-links-{{ entity_type }}-{{ entity_id }}"
    hx-swap="innerHTML"
    hx-on::after-request="this.closest('.kb-search-wrap').querySelector('input').value='';this.closest('.kb-search-results').innerHTML='';"
    class="w-full text-left px-3 py-1.5 text-xs text-gray-700 hover:bg-gray-50 flex items-center gap-2">
    {% if e.entry_type == 'article' %}
    <svg class="w-3 h-3 text-marsh flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
    </svg>
    {% else %}
    <svg class="w-3 h-3 text-red-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"/>
    </svg>
    {% endif %}
    <span class="flex-1 min-w-0 truncate">{{ e.title }}</span>
    <span class="inline-flex items-center px-1.5 py-0.5 rounded-full text-[9px] font-medium {{ e.colors.bg }} {{ e.colors.text }} flex-shrink-0">
      {{ e.category }}
    </span>
  </button>
  {% endfor %}
</div>
{% endif %}
