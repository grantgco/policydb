<details class="mt-2">
  <summary class="text-xs text-marsh hover:underline cursor-pointer select-none list-none">
    Search &amp; assign existing contact
  </summary>
  <div class="mt-2 border border-gray-200 rounded-lg p-3 bg-white shadow-sm">
    <input type="text" name="q" placeholder="Search by name or email..."
           hx-get="/contacts/search?context={{ picker_context }}&target_id={{ picker_target_id }}"
           hx-trigger="keyup delay:300ms"
           hx-target="#picker-results-{{ picker_context }}-{{ picker_target_id }}"
           hx-include="this"
           autocomplete="off"
           class="w-full border border-gray-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-marsh">
    <div id="picker-results-{{ picker_context }}-{{ picker_target_id }}" class="mt-2 max-h-60 overflow-y-auto">
    </div>
  </div>
</details>
