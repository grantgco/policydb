<div id="tpl-card-{{ t.id }}" class="border border-gray-200 rounded-lg p-4 {% if not t.active %}opacity-60{% endif %}">
  <div class="flex items-start justify-between mb-2">
    <div class="flex-1">
      <div class="flex items-center gap-2">
        {% if t.is_builtin %}
        <svg class="w-3.5 h-3.5 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
        {% endif %}
        <h4 class="text-sm font-semibold text-gray-900">{{ t.name }}</h4>
      </div>
      <p class="text-xs text-gray-500 mt-1">{{ t.description }}</p>
    </div>
    <div class="flex items-center gap-1 ml-3">
      <span class="inline-block px-2 py-0.5 text-[10px] font-medium uppercase rounded-full
        {% if t.deliverable_type == 'email' %}bg-blue-50 text-blue-700
        {% elif t.deliverable_type == 'report' %}bg-purple-50 text-purple-700
        {% elif t.deliverable_type == 'agenda' %}bg-amber-50 text-amber-700
        {% elif t.deliverable_type == 'narrative' %}bg-green-50 text-green-700
        {% elif t.deliverable_type == 'memo' %}bg-red-50 text-red-700
        {% elif t.deliverable_type == 'submission' %}bg-cyan-50 text-cyan-700
        {% elif t.deliverable_type == 'briefing' %}bg-indigo-50 text-indigo-700
        {% else %}bg-gray-50 text-gray-600{% endif %}">
        {{ t.deliverable_type }}
      </span>
      {% if not t.active %}
      <span class="px-2 py-0.5 text-[10px] font-medium uppercase rounded-full bg-gray-100 text-gray-500">Inactive</span>
      {% endif %}
    </div>
  </div>

  {% if manage_mode %}
  <div class="flex items-center gap-2 mt-3 pt-3 border-t border-gray-100">
    {% if not t.is_builtin %}
    <button type="button" class="text-xs text-marsh hover:text-marsh-dark"
            hx-get="/prompt-builder/templates/{{ t.id }}/edit"
            hx-target="#tpl-card-{{ t.id }}"
            hx-swap="outerHTML">Edit</button>
    {% endif %}
    <button type="button" class="text-xs text-gray-500 hover:text-gray-700"
            hx-post="/prompt-builder/templates/{{ t.id }}/duplicate"
            hx-target="#tpl-manage-list"
            hx-swap="innerHTML">Duplicate</button>
    <button type="button" class="text-xs text-gray-500 hover:text-gray-700"
            hx-post="/prompt-builder/templates/{{ t.id }}/toggle"
            hx-target="#tpl-card-{{ t.id }}"
            hx-swap="outerHTML">{{ 'Activate' if not t.active else 'Deactivate' }}</button>
    {% if not t.is_builtin %}
    <button type="button" class="text-xs text-red-400 hover:text-red-600"
            hx-post="/prompt-builder/templates/{{ t.id }}/delete"
            hx-target="#tpl-card-{{ t.id }}"
            hx-swap="outerHTML"
            hx-confirm="Delete this template?">Delete</button>
    {% endif %}
  </div>
  {% endif %}
</div>
