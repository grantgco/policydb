<tr id="pgm-row-{{ p.program_uid }}" class="border-t-2 border-indigo-400 bg-indigo-50">
  <td colspan="11" class="px-4 py-4">

    <form
      hx-post="/programs/{{ p.program_uid }}/renew/log"
      hx-target="#pgm-row-{{ p.program_uid }}"
      hx-swap="outerHTML"
      class="space-y-3">

      <!-- Row 1: Type, Subject, Duration, Follow-Up -->
      <div class="grid grid-cols-6 gap-3">
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Type</p>
          <select name="activity_type" required
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-indigo-400 bg-white">
            {% for t in activity_types %}
            <option>{{ t }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-span-2">
          <p class="text-xs text-gray-500 mb-0.5">Subject <span class="text-red-400">*</span></p>
          <input type="text" name="subject" required autofocus
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-indigo-400">
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Duration</p>
          <input type="number" name="duration_hours" min="0" step="any" placeholder="hrs"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-indigo-400">
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Follow-Up Date</p>
          <input type="date" name="follow_up_date"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-indigo-400">
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Contact</p>
          <input type="text" name="contact_person" placeholder="Name"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-indigo-400">
        </div>
      </div>

      <!-- Row 2: Details (collapsed by default) -->
      <details class="group">
        <summary class="text-xs text-gray-400 cursor-pointer hover:text-gray-600">Details +</summary>
        <div class="mt-1">
          <textarea name="details" rows="2"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-indigo-400"></textarea>
        </div>
      </details>

      <!-- Row 3: Actions -->
      <div class="flex items-center gap-3">
        <button type="submit"
          class="bg-indigo-500 hover:bg-indigo-600 text-white text-xs font-medium px-4 py-1.5 rounded-lg transition-colors">
          Save Activity
        </button>
        <button type="button"
          hx-get="/programs/{{ p.program_uid }}/renew/row"
          hx-target="#pgm-row-{{ p.program_uid }}"
          hx-swap="outerHTML"
          class="text-xs text-gray-500 hover:text-gray-700 hover:underline">
          Cancel
        </button>
        <span class="text-xs text-gray-400 ml-auto font-mono">{{ p.program_uid }} &middot; {{ p.program_name }} &middot; {{ p.client_name }}</span>
      </div>

    </form>

  </td>
</tr>
