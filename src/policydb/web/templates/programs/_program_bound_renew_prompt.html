<div class="fixed bottom-6 right-6 z-50 bg-white border border-blue-200 rounded-lg shadow-lg p-4 max-w-md animate-fade-in">
  <p class="text-sm font-semibold text-blue-700 mb-2">Program Bound Successfully</p>
  <p class="text-xs text-gray-600 mb-3">Would you like to renew all child policies and create the next term?</p>
  <div class="flex gap-2">
    <button hx-post="/programs/{{ program_uid }}/renew"
            hx-target="#bound-confirm-prompt"
            hx-swap="innerHTML"
            class="px-3 py-1.5 text-sm bg-marsh text-white rounded hover:bg-marsh/90">
      Renew Program
    </button>
    <button onclick="document.getElementById('bound-confirm-prompt').innerHTML=''"
            class="px-3 py-1.5 text-sm border border-gray-300 text-gray-600 rounded hover:bg-gray-50">
      Dismiss
    </button>
  </div>
</div>
