{# Fill Blitz — single field card #}
<div class="space-y-3">
  <div class="flex items-center justify-between text-xs text-gray-500">
    <span>{{ offset + 1 }} of {{ total }}</span>
    <span class="text-amber-600 font-medium">+{{ item.impact }}% impact</span>
  </div>

  <div class="text-sm">
    <span class="font-medium text-gray-900">{{ item.client_name }}</span>
    {% if item.policy_uid %}
      <span class="text-gray-400 mx-1">/</span>
      <span class="text-gray-600">{{ item.policy_uid }}</span>
      {% if item.policy_type %}
        <span class="text-gray-400">({{ item.policy_type }})</span>
      {% endif %}
    {% endif %}
  </div>

  <div class="text-sm font-medium text-amber-700 mb-1">{{ item.label }}</div>

  <form hx-patch="/api/health/blitz/save"
        hx-target="#blitz-container"
        hx-swap="innerHTML"
        class="flex gap-2">
    <input type="hidden" name="table" value="{{ 'policies' if item.policy_uid else 'clients' }}">
    <input type="hidden" name="record_id" value="{{ item.policy_uid or item.client_id }}">
    <input type="hidden" name="field" value="{{ item.field }}">
    <input type="hidden" name="offset" value="{{ offset }}">
    <input type="text" name="value" placeholder="Enter {{ item.label|lower }}..."
           class="flex-1 border border-gray-300 rounded px-3 py-1.5 text-sm focus:ring-marsh focus:border-marsh"
           autofocus>
    <button type="submit"
            class="px-3 py-1.5 bg-marsh text-white text-sm rounded hover:bg-marsh/90">
      Save & Next
    </button>
    <button type="button"
            class="px-3 py-1.5 border border-gray-300 text-gray-600 text-sm rounded hover:bg-gray-50"
            hx-get="/api/health/blitz/next?offset={{ offset + 1 }}"
            hx-target="#blitz-container"
            hx-swap="innerHTML">
      Skip
    </button>
  </form>
</div>
