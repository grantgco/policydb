{# Risk alerts banner — shown at top of Action Center when at_risk/critical items exist #}
{% if risk_alerts is defined and risk_alerts %}
<div class="mb-4 space-y-2" id="risk-alerts-banner">
  <div class="flex items-center gap-2 mb-1">
    <span class="w-2 h-2 rounded-full bg-red-500 flex-shrink-0 animate-pulse"></span>
    <span class="text-[10px] font-bold uppercase tracking-widest text-red-600">Risk Alerts</span>
    <span class="bg-red-100 text-red-700 text-[10px] font-bold px-2 py-0.5 rounded-full">{{ risk_alerts | length }}</span>
  </div>
  {% for alert in risk_alerts %}
  {% include "action_center/_risk_alert_row.html" %}
  {% endfor %}
</div>
{% endif %}
