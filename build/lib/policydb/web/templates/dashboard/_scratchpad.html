<div id="scratchpad-card" class="card p-3 mb-4">
  <div class="flex items-center justify-between mb-1.5">
    <h2 class="font-semibold text-gray-900 text-sm">Scratchpad</h2>
    <span id="dash-scratch-ts" class="text-xs text-gray-400 italic">
      {% if scratchpad_updated %}saved {{ scratchpad_updated[:16] }}{% endif %}
    </span>
  </div>
  <textarea
    id="dash-scratch-ta"
    name="content"
    rows="3"
    placeholder="Daily notes, action items, reminders…"
    class="w-full text-sm text-gray-800 bg-transparent resize-none focus:outline-none placeholder-gray-300 leading-relaxed">{{ scratchpad_content }}</textarea>
</div>

<script>
(function() {
  var ta = document.getElementById('dash-scratch-ta');
  var ts = document.getElementById('dash-scratch-ts');
  if (!ta) return;

  var mde = window.initMarkdownEditor('dash-scratch-ta', {minHeight: '80px'});

  var saveTimer = null;
  var saving = false;
  function autoSave() {
    if (saving) return;
    saving = true;
    var fd = new FormData();
    fd.set('content', ta.value);
    fetch('/dashboard/scratchpad', {
      method: 'POST', body: fd,
      headers: {'Accept': 'application/json'}
    }).then(function(r) { return r.json(); }).then(function(data) {
      if (data.ok && ts) ts.textContent = 'saved ' + data.saved_at;
    }).catch(function() {}).finally(function() { saving = false; });
  }

  if (mde) {
    mde.on('change', function() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(autoSave, 800);
    });
  } else {
    ta.addEventListener('input', function() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(autoSave, 800);
    });
  }
})();
</script>
