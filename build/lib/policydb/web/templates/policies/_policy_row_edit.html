<tr id="row-{{ p.policy_uid }}" class="border-t-2 border-marsh bg-blue-50">
  <td colspan="10" class="px-4 py-4">

    <form
      hx-post="/policies/{{ p.policy_uid }}/row/edit"
      hx-target="#row-{{ p.policy_uid }}"
      hx-swap="outerHTML"
      class="space-y-3">

      <!-- Row 1: Identifiers -->
      <div class="grid grid-cols-5 gap-3">
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Line of Business <span class="text-red-400">*</span></p>
          <select name="policy_type" required
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh bg-white">
            {% if p.policy_type and p.policy_type not in policy_types %}
            <option value="{{ p.policy_type }}" selected>{{ p.policy_type }}</option>
            {% endif %}
            {% for t in policy_types %}
            <option value="{{ t }}" {% if t == p.policy_type %}selected{% endif %}>{{ t }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Carrier <span class="text-red-400">*</span></p>
          <input type="text" name="carrier" value="{{ p.carrier }}" required
            list="ac-carrier-row-{{ p.policy_uid }}" autocomplete="off"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Policy Number</p>
          <input type="text" name="policy_number" value="{{ p.policy_number or '' }}"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">First Named Insured</p>
          <input type="text" name="first_named_insured" value="{{ p.first_named_insured or '' }}"
            placeholder="If different from client"
            list="ac-fni-row-{{ p.policy_uid }}" autocomplete="off"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Project / Location</p>
          <input type="text" name="project_name" value="{{ p.project_name or '' }}"
            list="ac-project-row-{{ p.policy_uid }}" autocomplete="off"
            placeholder="e.g. Main Street Condos"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
        </div>
      </div>

      <!-- Row 2: Dates + financials -->
      <div class="grid grid-cols-6 gap-3">
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Effective <span class="text-red-400">*</span></p>
          <input type="date" name="effective_date" value="{{ p.effective_date }}" required
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Expiration <span class="text-red-400">*</span></p>
          <input type="date" name="expiration_date" value="{{ p.expiration_date }}" required
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Premium <span class="text-red-400">*</span></p>
          <input type="text" class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh currency-input" autocomplete="off"
            value="{% if p.premium %}{{ '{:,.0f}'.format(p.premium | float) }}{% endif %}"
            placeholder="0" required>
          <input type="hidden" name="premium" value="{{ p.premium or '' }}">
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Limit</p>
          <input type="text" class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh currency-input" autocomplete="off"
            value="{% if p.limit_amount %}{{ '{:,.0f}'.format(p.limit_amount | float) }}{% endif %}"
            placeholder="0">
          <input type="hidden" name="limit_amount" value="{{ p.limit_amount or '' }}">
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Commission Rate</p>
          <input type="number" name="commission_rate" value="{{ p.commission_rate or '' }}" step="0.001" min="0" max="1"
            placeholder="0.12 = 12%"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Follow-Up</p>
          <input type="date" name="follow_up_date" value="{{ p.follow_up_date or '' }}"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
        </div>
      </div>

      <!-- Row 2b: Access Point -->
      <div class="grid grid-cols-3 gap-3">
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Access Point</p>
          <input type="text" name="access_point" value="{{ p.access_point or '' }}"
            placeholder="Wholesaler, etc."
            list="ac-ap-row-{{ p.policy_uid }}" autocomplete="off"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
        </div>
      </div>

      <!-- Row 3: Comments -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Description <span class="text-gray-400 font-normal">(client-facing)</span></p>
          <textarea name="description" rows="2" placeholder="Plain-English summary visible on schedule of insurance…"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">{{ p.description or '' }}</textarea>
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Internal Notes <span class="text-gray-400 font-normal">(never client-facing)</span></p>
          <textarea name="notes" rows="2"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">{{ p.notes or '' }}</textarea>
        </div>
      </div>

      <!-- Row 4: Actions -->
      <div class="flex items-center gap-3">
        <button type="submit"
          class="bg-marsh hover:bg-marsh-light text-white text-xs font-medium px-4 py-1.5 rounded-lg transition-colors">
          Save
        </button>
        <button type="button"
          hx-get="/policies/{{ p.policy_uid }}/row"
          hx-target="#row-{{ p.policy_uid }}"
          hx-swap="outerHTML"
          class="text-xs text-gray-500 hover:text-gray-700 hover:underline">
          Cancel
        </button>
        <a href="/policies/{{ p.policy_uid }}/edit"
           class="text-xs text-gray-400 hover:underline ml-auto">
          Full Edit →
        </a>
        <p class="text-xs text-gray-400 italic">Project change takes effect on next reload.</p>
      </div>

    </form>

    <datalist id="ac-carrier-row-{{ p.policy_uid }}"></datalist>
    <datalist id="ac-project-row-{{ p.policy_uid }}"></datalist>
    <datalist id="ac-fni-row-{{ p.policy_uid }}"></datalist>
    <datalist id="ac-ap-row-{{ p.policy_uid }}"></datalist>

    <script>
    (function(){
      var uid = "{{ p.policy_uid }}";
      var clientId = "{{ p.client_id }}";
      var clientScoped = new Set(["project_name", "exposure_city"]);
      [["carrier", "ac-carrier-row-" + uid],
       ["project_name", "ac-project-row-" + uid],
       ["first_named_insured", "ac-fni-row-" + uid],
       ["access_point", "ac-ap-row-" + uid]].forEach(function(pair){
        var clientParam = clientScoped.has(pair[0]) && clientId ? '&client_id=' + clientId : '';
        fetch("/policies/autocomplete?field=" + pair[0] + clientParam)
          .then(function(r){ return r.json(); })
          .then(function(vals){
            var dl = document.getElementById(pair[1]);
            if (!dl) return;
            dl.innerHTML = vals.map(function(v){
              return '<option value="' + v.replace(/"/g, '&quot;') + '"></option>';
            }).join('');
          });
      });
    })();
    </script>

  </td>
</tr>
