<tr id="opp-row-{{ o.policy_uid }}" class="border-t-2 border-amber-400 bg-amber-50/30">
  <td colspan="8" class="px-4 py-4">

    <form
      hx-post="/policies/{{ o.policy_uid }}/opp/edit"
      hx-target="#opp-row-{{ o.policy_uid }}"
      hx-swap="outerHTML"
      class="space-y-3">

      <!-- Row 1: core fields -->
      <div class="grid grid-cols-7 gap-3">
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Line of Business</p>
          <input type="text" name="policy_type" value="{{ o.policy_type or '' }}"
            list="opp-edit-types-{{ o.policy_uid }}" autocomplete="off"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-amber-400">
          <datalist id="opp-edit-types-{{ o.policy_uid }}">
            {% for t in policy_types %}<option value="{{ t }}">{% endfor %}
          </datalist>
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Carrier (Target)</p>
          <input type="text" name="carrier" value="{{ o.carrier or '' }}"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-amber-400">
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Status</p>
          <select name="opportunity_status"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-amber-400 bg-white">
            <option value=""></option>
            {% for s in opportunity_statuses %}
            <option value="{{ s }}" {% if s == o.opportunity_status %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Target Effective</p>
          <input type="date" name="target_effective_date" value="{{ o.target_effective_date or '' }}"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-amber-400">
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Est. Premium</p>
          <input type="number" name="premium" value="{{ o.premium or '' }}" step="any" min="0"
            placeholder="0"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-amber-400">
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Commission Rate</p>
          <input type="number" name="commission_rate" value="{{ o.commission_rate or '' }}"
            step="0.001" min="0" max="1" placeholder="0.12"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-amber-400">
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-0.5">Description</p>
          <input type="text" name="description" value="{{ o.description or '' }}"
            placeholder="Plain-English summary"
            class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-amber-400">
        </div>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-3">
        <button type="submit"
          class="bg-amber-500 hover:bg-amber-600 text-white text-xs font-medium px-4 py-1.5 rounded-lg transition-colors">
          Save
        </button>
        <button type="button"
          hx-get="/policies/{{ o.policy_uid }}/opp/client-row"
          hx-target="#opp-row-{{ o.policy_uid }}"
          hx-swap="outerHTML"
          class="text-xs text-gray-500 hover:text-gray-700 hover:underline">
          Cancel
        </button>
        <a href="/policies/{{ o.policy_uid }}/edit"
           class="text-xs text-gray-400 hover:underline ml-auto">
          Full Edit →
        </a>
        <span class="text-xs text-gray-400 font-mono">{{ o.policy_uid }}</span>
      </div>

    </form>
  </td>
</tr>
