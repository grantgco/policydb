<div class="space-y-2">
  <div class="flex items-center justify-between">
    <span class="text-xs font-semibold text-gray-700 uppercase tracking-wide">Renewal Checklist</span>
    <span class="text-xs text-gray-400 tabular-nums" id="ms-popover-count">{{ done }}/{{ total }}</span>
  </div>
  <div id="ms-popover-list">
    {% include "policies/_milestones.html" %}
  </div>
  <div class="border-t border-gray-100 pt-2 flex items-center justify-between">
    <a href="/policies/{{ policy.policy_uid }}/edit" class="text-xs text-marsh hover:underline">Full Edit →</a>
    <button type="button" onclick="closeMilestonePopover()" class="text-xs text-gray-400 hover:text-gray-600">Close</button>
  </div>
</div>
