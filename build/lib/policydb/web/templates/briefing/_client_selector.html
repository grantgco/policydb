{% if matches %}
<div class="absolute z-50 mt-1 w-72 bg-white border border-gray-200 rounded-lg shadow-lg max-h-64 overflow-y-auto">
  {% for c in matches %}
  <a href="/briefing/client/{{ c.id }}"
     class="block px-3 py-2 hover:bg-gray-50 text-sm border-b border-gray-50 last:border-0">
    <span class="font-medium text-gray-800">{{ c.name }}</span>
    {% if c.cn_number %}<span class="text-xs text-gray-400 ml-1">{{ c.cn_number }}</span>{% endif %}
    {% if c.industry_segment %}<span class="text-xs text-gray-400 ml-1">· {{ c.industry_segment }}</span>{% endif %}
    {% if c.group_id %}
    <a href="/briefing/group/{{ c.id }}" class="text-[10px] bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded ml-1 hover:bg-blue-200" onclick="event.stopPropagation()">Group</a>
    {% endif %}
  </a>
  {% endfor %}
</div>
{% endif %}
