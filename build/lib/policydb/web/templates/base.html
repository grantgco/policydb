<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PolicyDB{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            marsh: { DEFAULT: '#003865', light: '#0055a5' }
          }
        }
      }
    }
  </script>
  <style>
    .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .htmx-request.htmx-indicator { opacity: 1; }
  </style>
</head>
<body class="h-full">

<div class="min-h-full">
  <!-- Nav -->
  <nav class="bg-marsh border-b border-marsh-light">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="flex h-14 items-center justify-between">
        <div class="flex items-center gap-8">
          <a href="/" class="text-white font-semibold text-lg tracking-tight">PolicyDB</a>
          <div class="flex gap-1">
            <a href="/" class="nav-link {% if active == 'dashboard' %}bg-marsh-light{% endif %}">Dashboard</a>
            <a href="/clients" class="nav-link {% if active == 'clients' %}bg-marsh-light{% endif %}">Clients</a>
            <a href="/renewals" class="nav-link {% if active == 'renewals' %}bg-marsh-light{% endif %}">Renewals</a>
            <a href="/followups" class="nav-link {% if active == 'followups' %}bg-marsh-light{% endif %}">Follow-Ups</a>
            <a href="/activities" class="nav-link {% if active == 'activities' %}bg-marsh-light{% endif %}">Activity</a>
            <a href="/settings" class="nav-link {% if active == 'settings' %}bg-marsh-light{% endif %}">Settings</a>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <form action="/search" method="get" class="flex">
            <input name="q" type="search" placeholder="Search…"
              class="rounded-md border-0 bg-white/10 text-white placeholder-white/60 px-3 py-1.5 text-sm focus:ring-2 focus:ring-white focus:bg-white/20 outline-none w-48"
              value="{{ request.query_params.get('q', '') }}">
          </form>
        </div>
      </div>
    </div>
  </nav>

  <!-- Flash messages -->
  {% if flash %}
  <div class="bg-green-50 border-b border-green-200 px-4 py-2 text-sm text-green-800 text-center">
    {{ flash }}
  </div>
  {% endif %}

  <!-- Page -->
  <main class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
  </main>
</div>

<style>
  .nav-link {
    @apply text-white hover:bg-marsh-light rounded px-3 py-1.5 text-sm font-medium transition-colors opacity-80 hover:opacity-100;
  }
  .card {
    @apply bg-white rounded-xl border border-gray-300 shadow-sm;
  }
  .card-section {
    @apply bg-white rounded-xl border border-gray-300 shadow-sm overflow-hidden;
  }
  .card-header {
    @apply px-5 py-3 border-b border-gray-200 bg-gray-50 flex items-center justify-between;
  }
  .section-title {
    @apply text-xs font-semibold text-gray-500 uppercase tracking-wider;
  }
  .btn-filter { @apply border border-gray-300 text-gray-600 hover:border-marsh hover:text-marsh text-sm px-3 py-1.5 rounded-lg transition-colors; }
  .btn-filter.active { @apply border-marsh text-marsh bg-blue-50; }
  details[open] > summary .details-arrow { transform: rotate(90deg); }
  details > summary .details-arrow { transition: transform 150ms ease; display: inline-block; }
</style>

</body>
</html>
