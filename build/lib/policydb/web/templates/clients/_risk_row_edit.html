<tr id="risk-row-{{ r.id }}" class="bg-indigo-50/30">
  <td class="px-4 py-2" colspan="2">
    <select form="risk-edit-form-{{ r.id }}" name="category" required
      class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
      {% for cat in risk_categories %}
      <option {% if r.category == cat %}selected{% endif %}>{{ cat }}</option>
      {% endfor %}
    </select>
  </td>
  <td class="px-4 py-2">
    <select form="risk-edit-form-{{ r.id }}" name="severity"
      class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
      {% for sev in risk_severities %}
      <option {% if r.severity == sev %}selected{% endif %}>{{ sev }}</option>
      {% endfor %}
    </select>
  </td>
  <td class="px-4 py-2">
    <select form="risk-edit-form-{{ r.id }}" name="source"
      class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
      <option value="">—</option>
      {% for src in risk_sources %}
      <option {% if r.source == src %}selected{% endif %}>{{ src }}</option>
      {% endfor %}
    </select>
  </td>
  <td class="px-4 py-2">
    <input form="risk-edit-form-{{ r.id }}" type="date" name="review_date" value="{{ r.review_date or '' }}"
      class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
  </td>
  <td class="px-4 py-2" colspan="2">
    <div class="flex gap-2 items-center">
      <button type="submit" form="risk-edit-form-{{ r.id }}"
        class="text-xs bg-marsh text-white hover:bg-marsh-dark px-2 py-1 rounded transition-colors">Save</button>
      <button type="button"
        hx-get="/clients/{{ client.id }}/risks/{{ r.id }}/edit"
        hx-target="#risks-card"
        hx-swap="outerHTML"
        hx-vals='{"_cancel": "1"}'
        onclick="event.preventDefault(); htmx.ajax('GET', '/clients/{{ client.id }}/risks', {target:'#risks-card', swap:'outerHTML'}); return false;"
        class="text-xs text-gray-500 hover:underline">Cancel</button>
    </div>
  </td>
</tr>
<tr class="bg-indigo-50/20">
  <td colspan="7" class="px-4 py-2">
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
      <div class="sm:col-span-2">
        <label class="text-xs font-medium text-gray-500 block mb-1">Description</label>
        <input form="risk-edit-form-{{ r.id }}" type="text" name="description" value="{{ r.description or '' }}"
          placeholder="Risk description"
          class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
      </div>
      <div class="sm:col-span-2">
        <label class="text-xs font-medium text-gray-500 block mb-1">Notes</label>
        <input form="risk-edit-form-{{ r.id }}" type="text" name="notes" value="{{ r.notes or '' }}"
          placeholder="Notes…"
          class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
      </div>
      <div>
        <label class="flex items-center gap-1.5 text-xs text-gray-600 mt-3">
          <input form="risk-edit-form-{{ r.id }}" type="checkbox" name="has_coverage" value="1"
            {% if r.has_coverage %}checked{% endif %} class="rounded border-gray-300">
          <span>Coverage override</span>
        </label>
      </div>
      <div>
        <label class="text-xs font-medium text-gray-500 block mb-1">Linked Policy</label>
        <select form="risk-edit-form-{{ r.id }}" name="policy_uid"
          class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
          <option value="">— No policy —</option>
          {% for p in policy_uid_options %}
          <option value="{{ p.uid }}" {% if r.policy_uid == p.uid %}selected{% endif %}>{{ p.label }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
  </td>
</tr>
<form id="risk-edit-form-{{ r.id }}"
      hx-post="/clients/{{ client.id }}/risks/{{ r.id }}/edit"
      hx-target="#risks-card"
      hx-swap="outerHTML"
      style="display:none"></form>
