<div class="proj-hdr-wrap px-4 py-2 bg-amber-50 border-b border-amber-300">
  <form hx-post="/clients/{{ client.id }}/project/merge"
        hx-confirm="Merge '{{ project_name }}' into the selected project? All policies will be moved and this project will be removed."
        class="flex items-center gap-2">
    <input type="hidden" name="source_project" value="{{ project_name }}">
    <label class="text-xs text-gray-600 shrink-0">Merge {{ policy_count }} polic{{ 'y' if policy_count == 1 else 'ies' }} into:</label>
    <select name="target_project" required
      class="border border-gray-300 rounded px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-marsh bg-white">
      <option value="">Select project…</option>
      {% for p in other_projects %}
      <option value="{{ p }}">{{ p }}</option>
      {% endfor %}
    </select>
    <button type="submit"
      class="bg-amber-600 hover:bg-amber-700 text-white text-xs font-medium px-3 py-1.5 rounded">Merge</button>
    <button type="button"
      hx-get="/clients/{{ client.id }}/project-note?project={{ project_name | urlencode }}"
      hx-target="closest .proj-hdr-wrap"
      hx-swap="outerHTML"
      class="text-xs text-gray-500 hover:underline">Cancel</button>
  </form>
</div>
