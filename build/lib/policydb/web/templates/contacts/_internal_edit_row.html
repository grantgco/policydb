{% set row_id = "internal-" ~ (c.name | safe_id) %}
<tr id="{{ row_id }}" class="bg-amber-50/30">
  <td class="px-4 py-2 font-medium text-gray-800 text-sm">
    {{ c.name }}
    <p class="text-xs text-gray-400 font-normal mt-0.5">Editing shared info · assignment managed per client</p>
  </td>
  <td class="px-4 py-2">
    <input type="text" form="internal-edit-{{ row_id }}" name="role" value="{{ c.role or '' }}"
           placeholder="Role"
           class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
  </td>
  <td class="px-4 py-2">
    <input type="email" form="internal-edit-{{ row_id }}" name="email" value="{{ c.email or '' }}"
           placeholder="email@example.com"
           class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
  </td>
  <td class="px-4 py-2">
    <input type="text" form="internal-edit-{{ row_id }}" name="phone" value="{{ c.phone or '' }}"
           placeholder="Main phone"
           class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
    <input type="text" form="internal-edit-{{ row_id }}" name="mobile" value="{{ c.mobile or '' }}"
           placeholder="Cell"
           class="border border-gray-300 rounded px-2 py-1 text-xs w-full mt-1 focus:outline-none focus:ring-1 focus:ring-marsh">
  </td>
  <td class="px-4 py-2 text-xs text-gray-400 italic">
    <input type="text" form="internal-edit-{{ row_id }}" name="title" value="{{ c.title or '' }}"
           placeholder="Title"
           class="border border-gray-300 rounded px-2 py-1 text-xs w-full focus:outline-none focus:ring-1 focus:ring-marsh">
  </td>
  <td class="px-4 py-2">
    <div class="flex gap-2 items-center">
      <button type="submit" form="internal-edit-{{ row_id }}"
              class="text-xs bg-marsh text-white hover:bg-marsh-dark px-2 py-1 rounded transition-colors">Save</button>
      <button type="button"
              hx-get="/contacts/internal/{{ c.name | path_quote }}/row"
              hx-target="#{{ row_id }}"
              hx-swap="outerHTML"
              class="text-xs text-gray-400 hover:text-gray-600">Cancel</button>
    </div>
  </td>
</tr>
<form id="internal-edit-{{ row_id }}"
      hx-post="/contacts/internal/{{ c.name | path_quote }}/edit"
      hx-target="#{{ row_id }}"
      hx-swap="outerHTML"
      style="display:none"></form>
